<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA Kasa Pro | Finansal Komuta Merkezi</title>
    
    <!-- Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c' } 
                    } 
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: moveOrb 20s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 40vw; height: 40vw; background: #ea580c; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #3b82f6; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* ÖZEL İMLEÇ */
        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, .cursor-pointer { cursor: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%232563eb" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }
        .glass-card:hover { border-color: rgba(234, 88, 12, 0.3) !important; }
        
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.03) !important; }

        .sidebar-link.active { color: #ffffff !important; background-color: rgba(234, 88, 12, 0.9) !important; backdrop-filter: blur(10px); box-shadow: 0 10px 20px -5px rgba(234, 88, 12, 0.4); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(234, 88, 12, 0.4); border-radius: 10px; }
        
        .stat-card { border-left: 4px solid #ea580c; }
        .income-card { border-left-color: #22c55e; }
        .expense-card { border-left-color: #ef4444; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- LOADER -->
    <div id="loading" class="fixed inset-0 z-[100] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="h-10 w-10 border-2 border-slate-800 border-t-orange-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-black uppercase tracking-[0.3em] text-orange-500">Kasa Pro Yükleniyor</p>
    </div>

    <!-- GİRİŞ EKRANI -->
    <div id="login-overlay" class="min-h-screen flex items-center justify-center p-4 relative z-50">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl relative text-center">
            <div class="mb-10">
                <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-14 w-auto object-contain mx-auto mb-6">
                <span class="px-5 py-1.5 liquid-inner text-orange-500 rounded-full text-[10px] font-black uppercase tracking-widest border border-orange-500/20 shadow-sm">Finansal Komuta Merkezi</span>
            </div>
            <form id="login-form" class="space-y-4" onsubmit="window.handleLogin(event)">
                <input type="email" id="login-email" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white placeholder-slate-500 font-medium" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white placeholder-slate-500 font-medium" placeholder="Şifre">
                <button type="submit" id="login-btn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg transition hover:brightness-110 mt-4 border border-white/10 tracking-widest">Sisteme Giriş Yap</button>
            </form>
            <div id="login-error-container" class="mt-4 p-3 bg-red-500/10 rounded-xl hidden text-red-500 text-xs font-bold border border-red-500/20 text-center"></div>
        </div>
    </div>

    <!-- ANA PANEL -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-72 glass-card border-r border-white/5 flex flex-col h-screen shrink-0">
            <div class="p-8 text-center border-b border-white/5">
                <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 w-auto mx-auto mb-2 drop-shadow-md">
                <p class="text-[9px] font-black tracking-[0.4em] text-orange-500 uppercase italic">Kasa Pro Edition</p>
            </div>
            <nav class="flex-1 px-4 py-8 space-y-3 overflow-y-auto custom-scrollbar">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="sidebar-link w-full flex items-center space-x-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase transition hover:bg-white/5">
                    <i class="fa-solid fa-chart-line text-lg"></i><span>Genel Özet</span>
                </button>
                <button onclick="navigate('ledger')" id="nav-ledger" class="sidebar-link w-full flex items-center space-x-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase transition hover:bg-white/5">
                    <i class="fa-solid fa-receipt text-lg"></i><span>İşlem Defteri</span>
                </button>
                <button onclick="navigate('students')" id="nav-students" class="sidebar-link w-full flex items-center space-x-4 px-6 py-4 rounded-2xl font-bold text-xs uppercase transition hover:bg-white/5">
                    <i class="fa-solid fa-users-gear text-lg"></i><span>Öğrenci Finans</span>
                </button>
            </nav>
            <div class="p-6 border-t border-white/5 flex flex-col gap-3">
                <div class="flex items-center gap-3 px-2 mb-2">
                    <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center font-black text-xs text-white">A</div>
                    <p class="text-[10px] font-black uppercase text-slate-400 truncate" id="user-name-display">...</p>
                </div>
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[10px] uppercase transition border border-red-500/10"><i class="fa-solid fa-power-off mr-2"></i> Güvenli Çıkış</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative">
            <header class="sticky top-0 z-40 bg-darkBg/60 backdrop-blur-md p-6 md:px-12 flex justify-between items-center border-b border-white/5">
                <h1 class="text-2xl font-black tracking-tight uppercase italic" id="view-title">...</h1>
                <div class="flex items-center gap-4">
                    <button onclick="openModal()" class="px-5 py-2.5 bg-orange-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg hover:scale-105 transition border border-white/10">
                        <i class="fa-solid fa-plus mr-2"></i>Yeni İşlem
                    </button>
                </div>
            </header>

            <div class="p-6 md:p-12 max-w-7xl w-full mx-auto flex-1">
                <!-- Tab: Dashboard -->
                <div id="tab-dashboard" class="tab-content">
                    <div class="grid md:grid-cols-4 gap-6 mb-12">
                        <div class="glass-card stat-card income-card p-8 rounded-[2.5rem]">
                            <p class="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Aylık Gelir</p>
                            <p class="text-3xl font-black text-green-500" id="stat-month-income">0 ₺</p>
                        </div>
                        <div class="glass-card stat-card expense-card p-8 rounded-[2.5rem]">
                            <p class="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Aylık Gider</p>
                            <p class="text-3xl font-black text-red-500" id="stat-month-expense">0 ₺</p>
                        </div>
                        <div class="glass-card stat-card p-8 rounded-[2.5rem]" style="border-left-color: #3b82f6;">
                            <p class="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Net Durum (Ay)</p>
                            <p class="text-3xl font-black text-blue-500" id="stat-month-net">0 ₺</p>
                        </div>
                        <div class="glass-card stat-card p-8 rounded-[2.5rem]" style="border-left-color: #f59e0b;">
                            <p class="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Genel Kasa</p>
                            <p class="text-3xl font-black text-white" id="stat-total-balance">0 ₺</p>
                        </div>
                    </div>

                    <div class="grid lg:grid-cols-2 gap-8">
                        <div class="glass-card p-10 rounded-[3rem]">
                            <h4 class="font-black uppercase text-xs text-slate-500 mb-8 italic tracking-widest border-b border-white/5 pb-4">Son Finansal Hareketler</h4>
                            <div class="space-y-4" id="dashboard-recent-list"></div>
                        </div>
                        <div class="glass-card p-10 rounded-[3rem]">
                            <h4 class="font-black uppercase text-xs text-slate-500 mb-8 italic tracking-widest border-b border-white/5 pb-4">Kategori Dağılımı</h4>
                            <div class="space-y-6" id="dashboard-category-stats"></div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Ledger -->
                <div id="tab-ledger" class="tab-content">
                    <div class="glass-card p-6 rounded-[2rem] mb-8 flex flex-col md:flex-row gap-4 items-center">
                        <div class="relative flex-1 w-full">
                            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="ledger-search" placeholder="İşlem veya öğrenci ara..." class="w-full pl-12 pr-4 py-4 rounded-xl liquid-inner outline-none text-sm font-bold text-white border border-white/5 focus:border-orange-500 transition" oninput="filterLedger()">
                        </div>
                        <select id="ledger-type-filter" class="w-full md:w-48 p-4 rounded-xl liquid-inner text-xs font-black uppercase outline-none border border-white/5" onchange="filterLedger()">
                            <option value="all">Tüm Tipler</option>
                            <option value="income">Sadece Gelir</option>
                            <option value="expense">Sadece Gider</option>
                        </select>
                        <input type="date" id="ledger-date-filter" class="w-full md:w-48 p-4 rounded-xl liquid-inner text-xs font-black uppercase outline-none border border-white/5" onchange="filterLedger()">
                    </div>
                    <div class="glass-card rounded-[3rem] overflow-hidden">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-left">
                                <thead class="bg-black/20 text-[10px] font-black uppercase tracking-widest text-slate-500 border-b border-white/5">
                                    <tr>
                                        <th class="p-6">Tarih</th>
                                        <th class="p-6">Öğrenci / Başlık</th>
                                        <th class="p-6">Kategori</th>
                                        <th class="p-6">Açıklama</th>
                                        <th class="p-6 text-right">Tutar</th>
                                        <th class="p-6 text-right">İşlem</th>
                                    </tr>
                                </thead>
                                <tbody id="ledger-table-body" class="text-sm font-medium"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Tab: Students -->
                <div id="tab-students" class="tab-content">
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="student-financial-list"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: YENİ İŞLEM -->
    <div id="transaction-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]">
        <div class="max-w-xl w-full glass-card p-10 rounded-[3.5rem] shadow-2xl relative border border-white/10 animate__animated animate__zoomIn animate__faster">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="mb-8">
                <h3 class="text-2xl font-black italic uppercase tracking-tighter text-orange-500 drop-shadow-md">Finansal Giriş</h3>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">Sisteme yeni bir kalem ekleyin</p>
            </div>
            
            <form id="transaction-form" class="space-y-4" onsubmit="window.saveTransaction(event)">
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="setType('income')" id="btn-inc" class="py-4 rounded-2xl border-2 font-black text-xs uppercase transition shadow-sm">GELİR</button>
                    <button type="button" onclick="setType('expense')" id="btn-exp" class="py-4 rounded-2xl border-2 font-black text-xs uppercase transition shadow-sm opacity-50">GİDER</button>
                </div>
                <input type="hidden" id="t-type" value="income">
                
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 ml-1 block italic">Kategori</label>
                        <select id="t-category" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white border border-white/5 text-xs font-bold uppercase"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 ml-1 block italic">Öğrenci (Opsiyonel)</label>
                        <select id="t-student" class="w-full p-4 rounded-2xl liquid-inner outline-none text-white border border-white/5 text-xs font-bold"></select>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 ml-1 block italic">Tutar (₺)</label>
                        <input type="number" step="0.01" id="t-amount" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white border border-white/5 font-black text-xl text-center" placeholder="0.00">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 mb-2 ml-1 block italic">İşlem Notu</label>
                        <input type="text" id="t-desc" required class="w-full p-4 rounded-2xl liquid-inner outline-none text-white border border-white/5 font-medium text-sm" placeholder="Mart ayı ödemesi vb.">
                    </div>
                </div>
                
                <button type="submit" id="save-btn" class="w-full bg-orange-600 text-white py-5 rounded-[2.5rem] font-black uppercase shadow-lg transition hover:scale-[1.02] border border-white/10 mt-6 tracking-[0.2em]">İŞLEMİ MÜHÜRLE</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = null, students = [], transactions = [];
        const incomeCategories = ['Kurs Ücreti', 'Kitap/Materyal', 'Özel Ders', 'Diğer Gelir'];
        const expenseCategories = ['Kira', 'Fatura', 'Reklam/Pazarlama', 'Personel', 'Kırtasiye/Donanım', 'Diğer Gider'];

        // CORE UI
        function hideLoading() { const l = document.getElementById('loading'); if(l) { l.classList.add('opacity-0'); setTimeout(() => l.classList.add('hidden'), 500); } }
        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }
        function closeModal() { document.getElementById('transaction-modal').classList.add('hidden'); document.getElementById('transaction-modal').classList.remove('flex'); }
        function openModal() { document.getElementById('transaction-modal').classList.remove('hidden'); document.getElementById('transaction-modal').classList.add('flex'); }

        async function handleLogin(e) {
            e.preventDefault(); const btn = document.getElementById('login-btn'); btn.disabled = true;
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error-container').innerText = error.message; document.getElementById('login-error-container').classList.remove('hidden'); btn.disabled = false; } else { window.location.reload(); }
        }

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (data && data.role === 'teacher') {
                    userProfile = data; 
                    document.getElementById('user-name-display').innerText = data.full_name;
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                    setType('income');
                    await fetchData();
                    navigate('dashboard');
                } else { logout(); alert("Bu alan sadece rasyonel eğitmenlere aittir!"); }
            }
            hideLoading();
        }

        async function fetchData() {
            const { data: s } = await supabaseClient.from('profiles').select('*').eq('role', 'student').order('full_name');
            students = s || [];
            // Realtime list fetching
            const { data: t } = await supabaseClient.from('transactions').select('*, profiles!transactions_student_id_fkey(full_name)').order('created_at', {ascending: false});
            transactions = t || [];
            
            // Populate select
            document.getElementById('t-student').innerHTML = '<option value="">Genel (Öğrenci Yok)</option>' + students.map(st => `<option value="${st.id}">${st.full_name}</option>`).join('');
            updateStats();
        }

        function updateStats() {
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();

            const monthData = transactions.filter(t => {
                const d = new Date(t.created_at);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            });

            const mInc = monthData.filter(t => t.type === 'income').reduce((a, b) => a + Number(b.amount), 0);
            const mExp = monthData.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.amount), 0);
            const totalBal = transactions.reduce((acc, curr) => curr.type === 'income' ? acc + Number(curr.amount) : acc - Number(curr.amount), 0);

            document.getElementById('stat-month-income').innerText = mInc.toLocaleString('tr-TR') + ' ₺';
            document.getElementById('stat-month-expense').innerText = mExp.toLocaleString('tr-TR') + ' ₺';
            document.getElementById('stat-month-net').innerText = (mInc - mExp).toLocaleString('tr-TR') + ' ₺';
            document.getElementById('stat-total-balance').innerText = totalBal.toLocaleString('tr-TR') + ' ₺';
        }

        function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById('nav-'+v).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+v).classList.add('active');
            
            const titles = { 'dashboard': 'Kasa Kokpiti', 'ledger': 'İşlem Defteri', 'students': 'Öğrenci Cari Takibi' };
            document.getElementById('view-title').innerText = titles[v];

            if(v === 'dashboard') renderDashboardUI();
            if(v === 'ledger') renderLedgerUI();
            if(v === 'students') renderStudentsUI();
        }

        function renderDashboardUI() {
            const recent = transactions.slice(0, 8);
            document.getElementById('dashboard-recent-list').innerHTML = recent.map(t => `
                <div class="flex items-center justify-between p-4 liquid-inner rounded-2xl border border-white/5 transition hover:scale-[1.02]">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}">
                            <i class="fa-solid ${t.type === 'income' ? 'fa-plus' : 'fa-minus'}"></i>
                        </div>
                        <div>
                            <p class="font-black text-[11px] text-white uppercase drop-shadow-sm">${t.profiles?.full_name || t.category}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">${new Date(t.created_at).toLocaleDateString('tr-TR')}</p>
                        </div>
                    </div>
                    <p class="font-black text-sm ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">${t.type === 'income' ? '+' : '-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</p>
                </div>
            `).join('') || '<p class="text-center opacity-40 italic py-10">İşlem bulunmuyor.</p>';

            // Category Stats
            const cats = {};
            transactions.forEach(t => {
                cats[t.category] = (cats[t.category] || 0) + Number(t.amount);
            });
            const maxVal = Math.max(...Object.values(cats), 1);
            document.getElementById('dashboard-category-stats').innerHTML = Object.entries(cats).map(([name, val]) => `
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-black uppercase italic tracking-widest">
                        <span>${name}</span>
                        <span class="text-white">${val.toLocaleString('tr-TR')} ₺</span>
                    </div>
                    <div class="h-2 w-full liquid-inner rounded-full overflow-hidden border border-white/5 shadow-inner">
                        <div class="h-full bg-orange-600 rounded-full shadow-[0_0_10px_rgba(234,88,12,0.5)]" style="width: ${(val/maxVal)*100}%"></div>
                    </div>
                </div>
            `).join('') || '<p class="text-center opacity-40 italic py-10">Veri yok.</p>';
        }

        function renderLedgerUI() {
            window.filterLedger();
        }

        window.filterLedger = function() {
            const query = document.getElementById('ledger-search').value.toLowerCase();
            const type = document.getElementById('ledger-type-filter').value;
            const date = document.getElementById('ledger-date-filter').value;

            let filtered = transactions.filter(t => {
                const matchSearch = t.description.toLowerCase().includes(query) || (t.profiles?.full_name || '').toLowerCase().includes(query) || t.category.toLowerCase().includes(query);
                const matchType = type === 'all' || t.type === type;
                const matchDate = !date || t.created_at.startsWith(date);
                return matchSearch && matchType && matchDate;
            });

            document.getElementById('ledger-table-body').innerHTML = filtered.map(t => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                    <td class="p-6 text-[11px] font-bold text-slate-500 uppercase">${new Date(t.created_at).toLocaleDateString('tr-TR')}</td>
                    <td class="p-6 font-black text-slate-200">${t.profiles?.full_name || '<span class="opacity-40 italic">Genel İşlem</span>'}</td>
                    <td class="p-6"><span class="px-3 py-1 liquid-inner border border-white/10 rounded-lg text-[9px] font-black uppercase text-orange-400 drop-shadow-sm">${t.category}</span></td>
                    <td class="p-6 text-xs text-slate-400 font-medium">${t.description}</td>
                    <td class="p-6 text-right font-black ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">${t.type === 'income' ? '+' : '-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</td>
                    <td class="p-6 text-right">
                        <button onclick="window.deleteTransaction('${t.id}')" class="w-8 h-8 rounded-lg bg-red-600/10 text-red-500 opacity-0 group-hover:opacity-100 transition flex items-center justify-center hover:bg-red-600 hover:text-white border border-red-500/20"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderStudentsUI() {
            const studentBalances = {};
            students.forEach(s => {
                const totalPaid = transactions.filter(t => t.student_id === s.id && t.type === 'income').reduce((a, b) => a + Number(b.amount), 0);
                studentBalances[s.id] = totalPaid;
            });

            document.getElementById('student-financial-list').innerHTML = students.map(s => `
                <div class="glass-card p-8 rounded-[3rem] text-center group">
                    <div class="w-16 h-16 rounded-3xl bg-blue-600/10 border border-blue-500/20 mx-auto flex items-center justify-center text-2xl font-black text-blue-500 mb-6 group-hover:scale-110 transition duration-500 shadow-inner">
                        ${s.full_name[0].toUpperCase()}
                    </div>
                    <h3 class="font-black text-lg text-white mb-2 uppercase italic tracking-tighter drop-shadow-md">${s.full_name}</h3>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 border-b border-white/5 pb-4">${s.email}</p>
                    <div class="flex flex-col gap-1">
                        <p class="text-[10px] font-black text-slate-500 uppercase">Toplam Ödeme</p>
                        <p class="text-2xl font-black text-green-500 drop-shadow-md">${studentBalances[s.id].toLocaleString('tr-TR')} ₺</p>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full py-20 text-center opacity-40 font-bold uppercase italic tracking-widest">Öğrenci bulunmuyor.</div>';
        }

        window.setType = (type) => {
            document.getElementById('t-type').value = type;
            const isInc = type === 'income';
            document.getElementById('btn-inc').className = `py-4 rounded-2xl border-2 font-black text-xs uppercase transition shadow-sm ${isInc ? 'bg-green-600 border-green-500/30 text-white' : 'border-white/10 opacity-50 text-slate-500'}`;
            document.getElementById('btn-exp').className = `py-4 rounded-2xl border-2 font-black text-xs uppercase transition shadow-sm ${!isInc ? 'bg-red-600 border-red-500/30 text-white' : 'border-white/10 opacity-50 text-slate-500'}`;
            
            const cats = isInc ? incomeCategories : expenseCategories;
            document.getElementById('t-category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.saveTransaction = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "MÜHÜRLENİYOR...";
            
            const payload = {
                teacher_id: userProfile.id,
                student_id: document.getElementById('t-student').value || null,
                amount: document.getElementById('t-amount').value,
                description: document.getElementById('t-desc').value,
                type: document.getElementById('t-type').value,
                category: document.getElementById('t-category').value
            };

            const { error } = await supabaseClient.from('transactions').insert([payload]);
            if(!error) {
                await fetchData();
                closeModal();
                navigate(localStorage.getItem('lastView') || 'dashboard');
                document.getElementById('transaction-form').reset();
            } else alert("Rasyonel bir hata oluştu: " + error.message);
            btn.disabled = false; btn.innerText = "İŞLEMİ MÜHÜRLE";
        };

        window.deleteTransaction = async (id) => {
            if(!confirm('Bu finansal kaydı sistemden kalıcı olarak silmek istediğine emin misin Ali Hoca?')) return;
            await supabaseClient.from('transactions').delete().eq('id', id);
            await fetchData();
            navigate(localStorage.getItem('lastView'));
        };

        window.onload = initAuth;
    </script>
</body>
</html>
