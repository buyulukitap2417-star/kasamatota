<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA Kasa Pro | Finansal Komuta Merkezi v9.1</title>
    
    <!-- Merkezi Kütüphane Hub'ı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6', emerald: '#10b981', red: '#ef4444' } 
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'floating 3s ease-in-out infinite',
                    },
                    keyframes: {
                        floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        /* --- CORE ESTETİK --- */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; animation: moveOrb 25s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.2); } }

        /* --- MODERN CAM TASARIMI (ERGONOMİK) --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02) !important;
            transition: all 0.4s ease;
        }
        .glass-card:hover { transform: translateY(-3px); border-color: rgba(37, 99, 235, 0.4) !important; }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 0.75rem; }

        /* --- MENÜ SEÇİM VURGUSU --- */
        .sidebar-link { transition: all 0.3s ease; border-left: 0px solid transparent; opacity: 0.6; }
        .sidebar-link:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .sidebar-link.active { 
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.15) 0%, transparent 100%) !important;
            color: #3b82f6 !important;
            border-left: 3px solid #2563eb !important;
            padding-left: 1.5rem !important;
            opacity: 1;
            box-shadow: inset 10px 0 20px -10px rgba(37, 99, 235, 0.2);
        }
        .sidebar-link.active i { color: #3b82f6 !important; }

        /* --- TAB CONTENT --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- SCROLLBAR --- */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }
        
        /* --- BADGES --- */
        .asset-badge { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .logo-fixed { position: fixed; top: 20px; left: 32px; z-index: 2000; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4)); pointer-events: auto; }

        @media (max-width: 1024px) {
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row !important; z-index: 2001; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px !important; }
            .sidebar-link span { display: none; }
            .logo-fixed { top: 12px; left: 16px; }
            .logo-fixed img { height: 28px; }
            main { padding-bottom: 70px !important; }
        }
    </style>
</head>
<body class="dark overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- YÜKLEME EKRANI -->

        <p class="mt-4 text-[9px] font-black uppercase tracking-[0.4em] text-blue-500 animate-pulse text-center">BİLİMSEL VERİ Terminali Başlatılıyor</p>
    </div>

    <!-- SABİT LOGO -->
    <div class="logo-fixed animate__animated animate__fadeInDown">
        <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-8 md:h-10 w-auto object-contain">
    </div>

    <!-- ANA PANEL -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 glass-card border-r border-white/5 flex flex-col h-screen shrink-0 relative z-[1001] sidebar-fixed">
            <div class="h-28 hidden md:block"></div>
            <nav class="flex-1 px-3 py-2 space-y-1 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-5 border-t border-white/5 hidden md:block">
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black" id="user-avatar">A</div>
                    <div class="overflow-hidden"><p class="text-xs font-black truncate text-white" id="user-name-display">...</p><p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Yönetici</p></div>
                </div>
                <button onclick="logout()" class="w-full py-2.5 text-red-500 hover:bg-red-500/10 rounded-xl font-black text-[9px] uppercase transition border border-red-500/10 tracking-widest">Oturumu Kapat</button>
            </div>
        </aside>

        <!-- İçerik Alanı -->
        <main class="flex-1 h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="main-scroll-area">
            <header class="p-6 md:px-10 md:pt-10 flex justify-between items-center h-24 shrink-0" id="main-header">
                <div class="animate__animated animate__fadeInLeft">
                    <h1 class="text-2xl md:text-3xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1 italic" id="page-subtitle">Kasa Komuta Hub'ı</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="px-4 py-2 liquid-inner border border-white/10 rounded-xl font-black text-[10px] text-emerald-400 hidden sm:flex flex-col items-center shadow-lg">
                        <span class="opacity-50 text-[7px] uppercase tracking-widest">Anlık Varlık Gücü</span>
                        <span id="header-invest-total" class="text-white text-base">0 ₺</span>
                    </div>
                    <button onclick="openTransactionModal()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg hover:scale-105 transition-all border border-white/10">

    <!-- MODAL HUB -->
    <div id="transaction-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]">
        <div class="max-w-xl w-full glass-card p-8 rounded-[2.5rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn animate__faster">
            <button onclick="closeModal('transaction-modal')" class="absolute top-6 right-6 text-slate-500 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-xl font-black uppercase text-blue-500 mb-8 text-center tracking-tighter">İşlem Mühürleme</h3>
            <form id="transaction-form" onsubmit="window.saveTransaction(event)" class="space-y-4">
                <input type="hidden" id="editing-id" value="">
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="setType('income')" id="btn-inc" class="py-3 rounded-xl border-2 font-black text-xs uppercase transition bg-blue-600 border-blue-500/30 text-white shadow-lg">GELİR (+)</button>
                    <button type="button" onclick="setType('expense')" id="btn-exp" class="py-3 rounded-xl border-2 font-black text-xs uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm">GİDER (-)</button>
                </div>
                <input type="hidden" id="t-type" value="income">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black uppercase text-slate-500 mb-1.5 block">Kategori</label><select id="t-category" required class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-[11px] font-bold uppercase focus:border-blue-500 transition"></select></div>
                    <div><label class="text-[9px] font-black uppercase text-slate-500 mb-1.5 block">Banka</label><select id="t-bank" required class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-[11px] font-bold uppercase transition focus:border-blue-500"><option>Nays</option><option>İş Bankası</option><option>Halkbank</option><option>Garanti BBVA</option><option>YapıKredi</option><option>Nakit / Elden</option></select></div>
                </div>
                <div><label class="text-[9px] font-black uppercase text-slate-500 mb-1.5 block">İlişkili Kayıt</label><select id="t-student" class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-[11px] font-bold focus:border-blue-500 transition shadow-inner"></select></div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-1"><label class="text-[9px] font-black uppercase text-slate-500 mb-1.5 block">Tutar</label><input type="number" step="0.01" id="t-amount" required class="w-full p-3 rounded-lg liquid-inner text-center font-black text-lg text-white outline-none border border-white/10 focus:border-blue-500"></div>
                    <div class="col-span-2"><label class="text-[9px] font-black uppercase text-slate-500 mb-1.5 block">Açıklama</label><input type="text" id="t-desc" required class="w-full p-3 rounded-lg liquid-inner text-white outline-none border border-white/10 focus:border-blue-500 transition font-medium text-xs"></div>
                </div>
                <button type="submit" id="save-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:brightness-110 border border-white/10 tracking-widest text-[11px]">İŞLEMİ KAYDET</button>
            </form>
        </div>

    <!-- Yatırım Modalı -->
    <div id="investment-modal" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]">
        <div class="max-w-lg w-full glass-card p-10 rounded-[3rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn">
            <button onclick="closeModal('investment-modal')" class="absolute top-6 right-6 text-slate-500 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-xl font-black uppercase text-emerald-500 mb-8 text-center italic tracking-tighter">Varlık & Fon Kaydı</h3>
            <form id="investment-form" onsubmit="window.saveInvestment(event)" class="space-y-4">
                <input type="hidden" id="edit-inv-id" value="">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Varlık Adı (AFT, BTC..)</label><input type="text" id="inv-name" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-black uppercase transition focus:border-emerald-500"></div>
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Tür</label><select id="inv-type" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-bold uppercase transition focus:border-emerald-500"><option>Fon</option><option>Hisse Senedi</option><option>Altın</option><option>Döviz</option><option>Kripto Para</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Adet</label><input type="number" step="0.000001" id="inv-qty" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 font-black text-xl"></div>
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Alış Maliyeti</label><input type="number" step="0.0001" id="inv-cost" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 font-black text-xl"></div>
                </div>
                <div><label class="text-[9px] font-black text-orange-500 uppercase block mb-1 tracking-widest italic">Güncel Piyasa Fiyatı</label><input type="number" step="0.0001" id="inv-current" class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-orange-500/20 font-black text-2xl focus:border-orange-500" placeholder="0.0000"></div>
                <button type="submit" id="inv-save-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg hover:brightness-110 tracking-widest text-[11px]">VARLIĞI MÜHÜRLE</button>
            </form>
        </div>
    </div>

    <!-- GİRİŞ EKRANI -->
    <div id="login-overlay" class="fixed inset-0 min-h-screen flex items-center justify-center p-4 z-[4000] bg-darkBg hidden">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] text-center border border-white/10 animate__animated animate__zoomIn">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" class="h-10 mx-auto mb-8 drop-shadow-xl">
            <h3 class="text-xl font-black text-white italic mb-8">Kasa Terminali</h3>
            <form onsubmit="window.handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/5 font-bold text-sm" placeholder="E-posta">
                <input type="password" id="login-password" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/5 font-bold text-sm" placeholder="Şifre">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase shadow-lg hover:brightness-110 transition">Sisteme Bağlan</button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-[10px] font-bold hidden uppercase tracking-widest text-center"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = null, students = [], transactions = [], investments = [];
        let dashboardAssetChart = null, reportCharts = [];

        const incCats = ['Kurs Ücreti', 'Özel Ders', 'Kitap Satışı', 'Cashback', 'İade', 'Harçlık', 'Babaannemden Gelen', 'Diğer Gelir'];
        const expCats = ['Market', 'Abonelik', 'Fatura', 'Harçlık', 'Online Alışveriş', 'Yemek Harcamaları', 'Kira', 'Elektrik/Su/İnternet', 'Reklam', 'Hizmet/Personel', 'Babaannem İçin', 'Diğer Gider'];

        // --- CORE UI & AUTH ---
        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        async function initAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (data && data.role === 'teacher') {
                        userProfile = data;
                        document.getElementById('user-name-display').innerText = data.full_name;
                        document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                        document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                        document.getElementById('login-overlay').classList.add('hidden');
                        renderSidebar(); await fetchData();
                        navigate(localStorage.getItem('student_last_tab') || 'dashboard');
                    } else { logout(); }
                } else { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('login-overlay').classList.add('flex'); }
            } catch (err) {
                console.error("Auth Error:", err);
                logout();
            } finally {
                const loader = document.getElementById('loading');
                if(loader) { loader.classList.add('opacity-0'); setTimeout(() => loader.remove(), 700); }
                lucide.createIcons();
            }
        }

        async function handleLogin(e) {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "KONTROL EDİLİYOR...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error').innerText = "HATA: " + error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Sisteme Bağlan"; } 
            else { location.reload(); }
        }

        async function fetchData() {
            const [ {data: s}, {data: t}, {data: inv} ] = await Promise.all([
                supabaseClient.from('profiles').select('*').eq('role', 'student').order('full_name'),
                supabaseClient.from('transactions').select('*, profiles!transactions_student_id_fkey(full_name)').order('transaction_date', {ascending: false}),
                supabaseClient.from('investments').select('*').order('asset_name')
            ]);
            students = s || []; transactions = t || []; investments = inv || [];
            
            const studentSelect = document.getElementById('t-student');
            if (studentSelect) {
                studentSelect.innerHTML = '<option value="">Şahsi İşlem</option><option value="babaanne">BABAANNE (Özel)</option>' + students.map(st => `<option value="${st.id}">${st.full_name}</option>`).join('');
            }
            updateStats();
        }

        function updateStats() {
            const now = new Date();
            const personalTrans = transactions.filter(t => t.is_grandmother !== true);
            const mInc = personalTrans.filter(t => t.type === 'income' && new Date(t.transaction_date).getMonth() === now.getMonth()).reduce((a, b) => a + Number(b.amount), 0);
            const mExp = personalTrans.filter(t => t.type === 'expense' && new Date(t.transaction_date).getMonth() === now.getMonth()).reduce((a, b) => a + Number(b.amount), 0);
            const totalBal = personalTrans.reduce((acc, curr) => curr.type === 'income' ? acc + Number(curr.amount) : acc - Number(curr.amount), 0);
            
            const investTotal = investments.reduce((a, b) => {
                const price = Number(b.current_price) > 0 ? Number(b.current_price) : Number(b.average_cost);
                return a + (Number(b.quantity) * price);
            }, 0);

            const sInc = document.getElementById('stat-month-income'); if(sInc) sInc.innerText = mInc.toLocaleString('tr-TR') + ' ₺';
            const sExp = document.getElementById('stat-month-expense'); if(sExp) sExp.innerText = mExp.toLocaleString('tr-TR') + ' ₺';
            const hInv = document.getElementById('header-invest-total'); if(hInv) hInv.innerText = investTotal.toLocaleString('tr-TR') + ' ₺';
            
            const hScore = document.getElementById('header-score'); if(hScore) hScore.innerText = totalBal.toLocaleString('tr-TR');
        }

        function renderSidebar() {
            const items = [{id:'dashboard',n:'Dashboard',i:'layout-dashboard'},{id:'ledger',n:'İşlem Defteri',i:'book-text'},{id:'investments',n:'Yatırımlarım',i:'vault'},{id:'students',n:'Öğrenci Cari',i:'users'},{id:'grandmother',n:'Babaanne',i:'heart'},{id:'reports',n:'Analiz',i:'pie-chart'}];
            document.getElementById('sidebar-nav').innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-4 px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition hover:bg-white/5 group"><i data-lucide="${x.i}" class="w-5 h-5"></i><span>${x.n}</span></button>`).join('');
            lucide.createIcons();
        }

        function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const nBtn = document.getElementById('nav-'+v); if(nBtn) nBtn.classList.add('active');
            localStorage.setItem('student_last_tab', v);
            const cont = document.getElementById('view-content');
            cont.innerHTML = '<div class="p-20 flex justify-center items-center flex-col gap-4 animate__animated animate__fadeIn"><i class="fa-solid fa-atom fa-spin text-4xl text-blue-600"></i><p class="text-[9px] font-black uppercase tracking-widest text-slate-500">Mühürler Çözülüyor...</p></div>';
            
            const titles = { 'dashboard': 'Finansal Kokpit', 'ledger': 'İşlem Defteri', 'investments': 'Varlık Gücü Analizi', 'students': 'Öğrenci Cari', 'grandmother': 'Babaanne Kasası', 'reports': 'Görsel Analiz' };
            document.getElementById('page-title').innerText = titles[v] || 'MATOTA';

            setTimeout(() => {
                if(v === 'dashboard') renderDashboardUI();
                else if(v === 'investments') renderInvestmentsUI();
                else if(v === 'ledger') renderLedgerUI();
                else if(v === 'students') renderStudentsUI();
                else if(v === 'grandmother') renderGrandmotherUI();
                else if(v === 'reports') renderReportsUI();
                lucide.createIcons();
            }, 100);
        }

        // --- DASHBOARD UI ---
        function renderDashboardUI() {
            const personalTrans = transactions.filter(t => !t.is_grandmother);
            const recent = personalTrans.slice(0, 8);
            const totalBal = personalTrans.reduce((acc, curr) => curr.type === 'income' ? acc + Number(curr.amount) : acc - Number(curr.amount), 0);
            const mInc = personalTrans.filter(t => t.type === 'income' && new Date(t.transaction_date).getMonth() === new Date().getMonth()).reduce((a, b) => a + Number(b.amount), 0);
            const mExp = personalTrans.filter(t => t.type === 'expense' && new Date(t.transaction_date).getMonth() === new Date().getMonth()).reduce((a, b) => a + Number(b.amount), 0);

            document.getElementById('view-content').innerHTML = `
                <div class="grid lg:grid-cols-2 gap-8 view-frame">
                    <div class="space-y-6">
                        <div class="bg-blue-600 p-10 rounded-[3rem] text-white shadow-2xl flex flex-col items-center justify-center relative overflow-hidden group border border-white/20">
                            <span class="text-[9px] uppercase font-black opacity-70 mb-2 tracking-[0.5em]">Ana Kasa Mevcudiyeti</span>
                            <h2 class="text-7xl font-black italic drop-shadow-2xl">${totalBal.toLocaleString('tr-TR')} ₺</h2>
                            <i data-lucide="shield-check" class="absolute -right-4 -bottom-4 w-40 h-40 opacity-10 group-hover:rotate-12 transition-transform duration-1000"></i>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                             <div class="glass-card p-8 rounded-3xl border-l-4 border-l-green-500">
                                <p class="text-[9px] font-black uppercase text-slate-500 mb-1 tracking-widest">Aylık Gelir</p>
                                <p class="text-xl font-black text-green-500">${mInc.toLocaleString('tr-TR')} ₺</p>
                             </div>
                             <div class="glass-card p-8 rounded-3xl border-l-4 border-l-red-500">
                                <p class="text-[9px] font-black uppercase text-slate-500 mb-1 tracking-widest">Aylık Gider</p>
                                <p class="text-xl font-black text-red-500">${mExp.toLocaleString('tr-TR')} ₺</p>
                             </div>
                        </div>
                    </div>
                    <div class="glass-card p-8 rounded-[2.5rem] flex flex-col shadow-2xl">
                        <h4 class="font-black uppercase text-[10px] text-slate-500 mb-6 border-b border-white/5 pb-4 italic tracking-[0.3em] flex justify-between">Varlık Hub Dağılımı <i data-lucide="pie-chart" class="w-4"></i></h4>
                        <div class="flex-1 min-h-[220px]"><canvas id="dashboardAssetChart"></canvas></div>
                    </div>
                    <div class="lg:col-span-2 glass-card p-8 rounded-[3rem] shadow-2xl">
                        <h4 class="font-black uppercase text-[10px] text-slate-500 mb-6 border-b border-white/5 pb-4 italic tracking-[0.3em]">Son Finansal Kayıtlar</h4>
                        <div class="grid md:grid-cols-2 gap-4" id="dash-recent-list">
                            ${recent.map(t => `
                                <div class="p-4 liquid-inner flex justify-between items-center rounded-2xl border border-white/5 transition hover:bg-white/5">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-xl flex items-center justify-center ${t.type==='income'?'bg-green-500/10 text-green-500':'bg-red-500/10 text-red-500'} shadow-inner border border-white/5 text-[10px]"><i class="fa-solid ${t.type==='income'?'fa-plus':'fa-minus'}"></i></div>
                                        <div><p class="font-black text-white text-[11px] uppercase truncate max-w-[120px]">${t.profiles?.full_name || t.category}</p><p class="text-[8px] font-bold text-slate-600 uppercase mt-1">${new Date(t.transaction_date).toLocaleDateString('tr-TR')}</p></div>
                                    </div>
                                    <p class="font-black text-sm ${t.type==='income'?'text-green-500':'text-red-500'}">${t.type==='income'?'+':'-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</p>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;

            const assetData = {}; 
            investments.forEach(i => {
                const currentVal = Number(i.quantity) * (Number(i.current_price) > 0 ? Number(i.current_price) : Number(i.average_cost));
                assetData[i.asset_type] = (assetData[i.asset_type] || 0) + currentVal;
            });
            if(dashboardAssetChart) dashboardAssetChart.destroy();
            dashboardAssetChart = new Chart(document.getElementById('dashboardAssetChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(assetData), datasets: [{ data: Object.values(assetData), backgroundColor: ['#10b981','#2563eb','#f59e0b','#8b5cf6','#ef4444'], borderWidth: 0, hoverOffset: 15 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#475569', font: { size: 10, weight: '800' }, padding: 15 } } } }
            });
            lucide.createIcons();
            updateStats();
        }

        // --- INVESTMENTS & FON TAKİBİ ---
        function renderInvestmentsUI() {
            document.getElementById('view-content').innerHTML = `
                <div class="space-y-10 view-frame">
                    <div class="flex justify-between items-center glass-card p-8 rounded-[2.5rem] border border-blue-500/20 shadow-2xl">
                        <div><h2 class="text-2xl font-black text-emerald-400 uppercase italic tracking-tighter">Portföy Analizi</h2><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Anlık Kar/Zarar ve Varlık Performansı</p></div>
                        <button onclick="openInvestmentModal()" class="px-8 py-4 bg-emerald-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-2xl hover:scale-105 transition-all border border-white/10 group"><i data-lucide="plus-circle" class="w-4 h-4 mr-2 inline"></i>EKLE</button>
                    </div>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="inv-grid"></div>
                    <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl border border-white/10">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-left">
                                <thead class="bg-black/30 text-[9px] font-black uppercase text-slate-400 border-b border-white/10"><tr>
                                    <th class="p-6">Varlık Kimliği</th><th class="p-6">Tür</th><th class="p-6 text-center">Adet</th><th class="p-6 text-center">Ort. Maliyet</th><th class="p-6 text-right">Piyasa Değeri</th><th class="p-6 text-right">#</th>
                                </tr></thead>
                                <tbody id="inv-table" class="text-[11px] font-bold text-slate-300"></tbody>
                            </table>
                        </div>
                    </div>
                </div>`;

            document.getElementById('inv-grid').innerHTML = investments.map(i => {
                const totalCost = Number(i.quantity) * Number(i.average_cost);
                const currentVal = Number(i.quantity) * (Number(i.current_price) > 0 ? Number(i.current_price) : Number(i.average_cost));
                const pnl = currentVal - totalCost; const pnlRate = totalCost > 0 ? ((currentVal / totalCost) - 1) * 100 : 0;
                const isProfit = pnl >= 0;
                return `
                    <div class="glass-card p-10 rounded-[3.5rem] border-t-8 ${isProfit?'border-t-emerald-500':'border-t-red-500'} relative overflow-hidden group shadow-2xl">
                        <div class="flex justify-between items-start mb-8 relative z-10">
                            <span class="asset-badge shadow-lg">${i.asset_type}</span>
                            <div class="flex gap-2">
                                <button onclick="window.editInv('${i.id}')" class="w-8 h-8 rounded-lg liquid-inner flex items-center justify-center text-slate-500 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="window.deleteInv('${i.id}')" class="w-8 h-8 rounded-lg liquid-inner flex items-center justify-center text-slate-500 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <h4 class="text-2xl font-black text-white italic uppercase tracking-tighter mb-6 drop-shadow-xl">${i.asset_name}</h4>
                        <div class="flex justify-between items-end border-t border-white/5 pt-6 relative z-10">
                            <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Mevcut Büyüklük</p><p class="text-2xl font-black text-white drop-shadow-lg">${currentVal.toLocaleString('tr-TR')} ₺</p></div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Kar / Zarar</p>
                                <p class="text-base font-black ${isProfit?'text-emerald-400':'text-red-500'}">${isProfit?'+':''}${pnl.toLocaleString('tr-TR')} ₺</p>
                                <span class="text-[9px] font-black ${isProfit?'text-emerald-400':'text-red-500'} opacity-70">(${isProfit?'+':''}${pnlRate.toFixed(2)}%)</span>
                            </div>
                        </div>
                        <div class="absolute -bottom-10 -left-10 p-16 opacity-5 group-hover:scale-125 transition-transform duration-1000 rotate-12"><i class="fa-solid fa-vault text-[8rem]"></i></div>
                    </div>`;
            }).join('') || '<div class="col-span-full py-40 glass-card rounded-[3rem] text-center italic font-black uppercase tracking-widest opacity-20 border-4 border-dashed border-white/5">Yatırım kaydı bulunmuyor.</div>';

            document.getElementById('inv-table').innerHTML = investments.map(i => `
                <tr class="border-b border-white/5 hover:bg-white/10 transition-colors group">
                    <td class="p-6 uppercase font-black text-white text-sm">${i.asset_name}</td>
                    <td class="p-6 uppercase text-slate-500 tracking-widest text-[9px]">${i.asset_type}</td>
                    <td class="p-6 text-center font-mono text-slate-300">${i.quantity}</td>
                    <td class="p-6 text-center font-mono text-slate-300">${Number(i.average_cost).toLocaleString('tr-TR')} ₺</td>
                    <td class="p-6 text-right font-black ${ (Number(i.current_price)-Number(i.average_cost)) >= 0 ? 'text-emerald-400' : 'text-red-500' } text-base">${Number(i.current_price || i.average_cost).toLocaleString('tr-TR')} ₺</td>
                    <td class="p-6 text-right"><button onclick="window.deleteInv('${i.id}')" class="text-red-500/20 hover:text-red-500 transition-all"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        }

        window.saveInvestment = async (e) => {
            e.preventDefault(); const btn = document.getElementById('inv-save-btn'); btn.disabled = true; btn.innerText = "MÜHÜRLENİYOR...";
            const editId = document.getElementById('edit-inv-id').value;
            const data = { teacher_id: userProfile.id, asset_name: document.getElementById('inv-name').value, asset_type: document.getElementById('inv-type').value, quantity: Number(document.getElementById('inv-qty').value), average_cost: Number(document.getElementById('inv-cost').value), current_price: Number(document.getElementById('inv-current').value || 0) };
            const { error } = editId ? await supabaseClient.from('investments').update(data).eq('id', editId) : await supabaseClient.from('investments').insert([data]);
            if(!error) { await fetchData(); closeModal('investment-modal'); navigate('investments'); } else alert("Sistem Hatası: " + error.message);
            btn.disabled = false; btn.innerText = "VARLIĞI MÜHÜRLE";
        };

        window.editInv = (id) => { 
            const i = investments.find(x => x.id === id); if(!i) return; 
            document.getElementById('edit-inv-id').value = i.id; 
            document.getElementById('inv-name').value = i.asset_name; 
            document.getElementById('inv-type').value = i.asset_type; 
            document.getElementById('inv-qty').value = i.quantity; 
            document.getElementById('inv-cost').value = i.average_cost; 
            document.getElementById('inv-current').value = i.current_price || 0; 
            document.getElementById('investment-modal').classList.remove('hidden'); document.getElementById('investment-modal').classList.add('flex');
            lucide.createIcons();
        };

        // --- DİĞER MODÜLLER (LEDGER, GRANDMOTHER, STUDENTS, REPORTS) ---
        function renderLedgerUI() {
            document.getElementById('view-content').innerHTML = `
                <div class="space-y-6 view-frame">
                    <div class="glass-card p-6 rounded-3xl flex items-center shadow-xl border border-white/5">
                        <i data-lucide="search" class="text-slate-500 w-5 h-5 mr-4"></i>
                        <input type="text" id="ledger-search-input" placeholder="İşlemlerde ara..." class="w-full bg-transparent outline-none text-white font-bold text-sm" oninput="window.runLedgerFilter()">
                    </div>
                    <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-black/30 text-[10px] font-black uppercase text-slate-500 border-b border-white/10"><tr>
                                <th class="p-6">Tarih</th><th class="p-6">İşlem Sahibi</th><th class="p-6 text-right">Tutar</th><th class="p-6 text-right">#</th>
                            </tr></thead>
                            <tbody id="ledger-table-body" class="text-xs font-bold text-slate-300"></tbody>
                        </table>
                    </div>
                </div>`;
            window.runLedgerFilter();
        }

        window.runLedgerFilter = () => {
            const q = document.getElementById('ledger-search-input').value.toLowerCase();
            const filtered = transactions.filter(t => !t.is_grandmother && (t.description.toLowerCase().includes(q) || t.category.toLowerCase().includes(q)));
            document.getElementById('ledger-table-body').innerHTML = filtered.map(t => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                    <td class="p-6 text-slate-500 font-bold uppercase text-[9px]">${new Date(t.transaction_date).toLocaleDateString('tr-TR')}</td>
                    <td class="p-6 font-black uppercase text-slate-200 text-xs">${t.profiles?.full_name || 'Şahsi Kayıt'} <br><span class="opacity-40 text-[9px]">${t.category}</span></td>
                    <td class="p-6 text-right font-black ${t.type==='income'?'text-green-500':'text-red-500'} text-base">${t.type==='income'?'+':'-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</td>
                    <td class="p-6 text-right"><button onclick="window.deleteItem('transactions', '${t.id}', window.fetchData)" class="opacity-0 group-hover:opacity-100 transition text-red-500/30 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        };

        window.renderGrandmotherUI = () => {
            const list = transactions.filter(t => t.is_grandmother);
            const inc = list.filter(t=>t.type==='income').reduce((a,b)=>a+Number(b.amount),0);
            const exp = list.filter(t=>t.type==='expense').reduce((a,b)=>a+Number(b.amount),0);
            
            document.getElementById('view-content').innerHTML = `
                <div class="space-y-8 view-frame">
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="glass-card p-10 rounded-[3rem] text-center border-l-8 border-l-purple-500 shadow-2xl relative overflow-hidden group">
                             <p class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.3em]">Ondan Gelen</p>
                             <p class="text-4xl font-black text-purple-400 drop-shadow-lg">${inc.toLocaleString('tr-TR')} ₺</p>
                             <i data-lucide="heart" class="absolute -right-4 -bottom-4 w-28 h-28 opacity-5 group-hover:scale-110 transition-transform"></i>
                        </div>
                        <div class="glass-card p-10 rounded-[3rem] text-center border-l-8 border-l-pink-500 shadow-2xl">
                             <p class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.3em]">Ona Giden</p>
                             <p class="text-4xl font-black text-pink-500 drop-shadow-lg">${exp.toLocaleString('tr-TR')} ₺</p>
                        </div>
                        <div class="glass-card p-10 rounded-[3rem] text-center border-l-8 border-l-white/20 shadow-2xl">
                             <p class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-[0.3em]">Kasa Durumu</p>
                             <p class="text-4xl font-black text-white drop-shadow-lg">${(inc - exp).toLocaleString('tr-TR')} ₺</p>
                        </div>
                    </div>
                    <div class="space-y-3 max-w-4xl mx-auto">
                        ${list.map(t => `
                            <div class="p-6 liquid-inner border border-white/10 flex justify-between items-center rounded-2xl transition hover:shadow-xl group">
                                <div class="flex items-center gap-5">
                                    <div class="w-11 h-11 rounded-2xl liquid-inner flex items-center justify-center ${t.type==='income'?'text-purple-500':'text-pink-500'} shadow-inner border border-white/5"><i class="fa-solid ${t.type==='income'?'fa-heart-circle-plus':'fa-hand-holding-heart'} text-xl"></i></div>
                                    <div><p class="font-black text-white text-base uppercase drop-shadow-md">${t.description}</p><p class="text-[9px] text-slate-600 font-bold uppercase mt-1 tracking-widest">${new Date(t.transaction_date).toLocaleDateString('tr-TR')} • ${t.bank_name}</p></div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <p class="text-xl font-black ${t.type==='income'?'text-purple-400':'text-pink-400'}">${t.type==='income'?'+':'-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</p>
                                    <button onclick="window.deleteItem('transactions', '${t.id}', window.fetchData)" class="opacity-0 group-hover:opacity-100 transition text-red-500/20 hover:text-red-500"><i class="fa-solid fa-trash-alt"></i></button>
                                </div>
                            </div>`).join('') || '<p class="text-center opacity-30 italic py-16 font-black uppercase text-[10px]">Henüz mühürlenmiş kayıt yok.</p>'}
                    </div>
                </div>`;
            lucide.createIcons();
        }

        window.renderStudentsUI = () => {
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 view-frame" id="student-cari-zone"></div>`;
            document.getElementById('student-cari-zone').innerHTML = students.map(s => {
                const total = transactions.filter(t => t.student_id === s.id && t.type === 'income').reduce((a,b) => a + Number(b.amount), 0);
                return `
                    <div class="glass-card p-10 rounded-[3.5rem] text-center group transition-all duration-500 hover:border-blue-500/30 relative overflow-hidden">
                        <div class="w-20 h-20 rounded-[2rem] bg-blue-600/10 mx-auto flex items-center justify-center text-blue-500 text-4xl font-black mb-8 border-2 border-blue-500/20 shadow-2xl group-hover:scale-110 transition-transform">${s.full_name[0]}</div>
                        <h4 class="text-xl font-black text-white uppercase italic mb-2 tracking-tighter drop-shadow-xl">${s.full_name}</h4>
                        <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mb-10 border-b border-white/5 pb-4">${s.email}</p>
                        <div class="p-5 liquid-inner rounded-3xl border border-green-500/10 shadow-inner">
                             <p class="text-[9px] font-black text-slate-500 uppercase mb-1 italic">Ödenen Toplam</p>
                             <p class="text-3xl font-black text-green-500 drop-shadow-lg">${total.toLocaleString('tr-TR')} ₺</p>
                        </div>
                        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/5 rounded-full group-hover:scale-150 transition-all duration-1000"></div>
                    </div>`;
            }).join('');
        };

        window.renderReportsUI = () => {
            document.getElementById('view-content').innerHTML = `
                <div class="grid md:grid-cols-2 gap-10 view-frame">
                    <div class="glass-card p-10 rounded-[3.5rem] flex flex-col items-center shadow-2xl relative overflow-hidden min-h-[450px]">
                        <h4 class="text-[10px] font-black uppercase text-slate-500 mb-10 tracking-widest italic border-b border-white/5 pb-4 w-full text-center">Gider Kategorileri Analizi</h4>
                        <div class="w-full h-80"><canvas id="expenseChart"></canvas></div>
                    </div>
                    <div class="glass-card p-10 rounded-[3.5rem] flex flex-col items-center shadow-2xl relative overflow-hidden min-h-[450px]">
                        <h4 class="text-[10px] font-black uppercase text-slate-500 mb-10 tracking-widest italic border-b border-white/5 pb-4 w-full text-center">Banka Likidite Dağılımı</h4>
                        <div class="w-full h-80"><canvas id="bankPieChart"></canvas></div>
                    </div>
                </div>`;
            
            const expData = {}; transactions.filter(t=>t.type==='expense' && !t.is_grandmother).forEach(t=>expData[t.category]=(expData[t.category]||0)+Number(t.amount));
            const bankData = {}; transactions.forEach(t=>bankData[t.bank_name]=(bankData[t.bank_name]||0)+(t.type==='income'?Number(t.amount):-Number(t.amount)));
            
            new Chart(document.getElementById('expenseChart'), { type: 'pie', data: { labels: Object.keys(expData), datasets: [{ data: Object.values(expData), backgroundColor: ['#ef4444','#f97316','#eab308','#8b5cf6','#ec4899','#06b6d4','#10b981'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#475569', font: { weight: '900', size: 10 } } } } } });
            new Chart(document.getElementById('bankPieChart'), { type: 'doughnut', data: { labels: Object.keys(bankData), datasets: [{ data: Object.values(bankData), backgroundColor: ['#2563eb','#10b981','#8b5cf6','#ea580c','#ef4444','#ec4899'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#475569', font: { weight: '900', size: 10 } } } } } });
        };

        // --- SUBMISSION MOTORU ---
        window.saveTransaction = async (e) => {
            e.preventDefault(); const btn = document.getElementById('save-btn'); btn.disabled = true; btn.innerText = "MÜHÜRLENİYOR...";
            const editId = document.getElementById('editing-id').value;
            const stdVal = document.getElementById('t-student').value; const isGm = stdVal === 'babaanne';
            const data = { teacher_id: userProfile.id, student_id: (isGm || !stdVal) ? null : stdVal, amount: Number(document.getElementById('t-amount').value), description: document.getElementById('t-desc').value, type: document.getElementById('t-type').value, category: document.getElementById('t-category').value, bank_name: document.getElementById('t-bank').value, is_grandmother: isGm, transaction_date: new Date().toISOString() };
            const res = editId ? await supabaseClient.from('transactions').update(data).eq('id', editId) : await supabaseClient.from('transactions').insert([data]);
            if(!res.error) { await fetchData(); closeModal('transaction-modal'); navigate('dashboard'); } else alert(res.error.message); btn.disabled = false;
        };

        window.setType = (type) => {
            document.getElementById('t-type').value = type; const isInc = type === 'income';
            document.getElementById('btn-inc').className = isInc ? 'py-3 rounded-xl border-2 font-black text-xs uppercase transition bg-blue-600 border-blue-500/30 text-white shadow-lg' : 'py-3 rounded-xl border-2 font-black text-xs uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm';
            document.getElementById('btn-exp').className = !isInc ? 'py-3 rounded-xl border-2 font-black text-xs uppercase transition bg-red-600 border-red-500/30 text-white shadow-lg' : 'py-3 rounded-xl border-2 font-black text-xs uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm';
            document.getElementById('t-category').innerHTML = (isInc ? incCats : expCats).map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.deleteItem = async (tbl, id, cb) => { if(confirm("Onaylıyor musun Ali Hoca?")) { await supabaseClient.from(tbl).delete().eq('id', id); await cb(); navigate(localStorage.getItem('student_last_tab')); } };

        window.onload = initAuth;
    </script>
</body>
</html>
