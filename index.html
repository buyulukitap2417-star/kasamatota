    <script>
        // ==========================================
        // PLATFORM CORE JS (PERSONALIZED & LIVE)
        // ==========================================
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const RAPID_API_KEY = "d17d7ed7dfmshcd76628704114c6p12384ajsn114c217a2582";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = null, students = [], transactions = [], investments = [];
        let dashboardAssetChart = null;
        let marketDataInterval = null;
        const updateSlots = ["09:00", "12:00", "16:00", "19:00", "22:00"];

        const incCats = ['Kurs Ücreti', 'Özel Ders', 'Kitap Satışı', 'Cashback', 'İade', 'Harçlık', 'Babaannemden Gelen', 'Diğer Gelir'];
        const expCats = ['Market', 'Abonelik', 'Fatura', 'Harçlık', 'Online Alışveriş', 'Yemek Harcamaları', 'Kira', 'Elektrik/Su/İnternet', 'Reklam', 'Hizmet/Personel', 'Babaannem İçin', 'Diğer Gider'];

        // --- AUTH & INIT ---
        async function initAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (data && data.role === 'teacher') {
                        userProfile = data;
                        const nameEl = document.getElementById('user-name-display');
                        if (nameEl) nameEl.innerText = data.full_name;
                        document.getElementById('app').classList.remove('hidden'); 
                        document.getElementById('app').classList.add('flex');
                        document.getElementById('login-overlay').classList.add('hidden');
                        await fetchData();
                        await checkScheduledUpdates();
                        navigate(localStorage.getItem('student_last_tab') || 'dashboard');
                    } else { logout(); }
                } else { 
                    document.getElementById('login-overlay').classList.remove('hidden'); 
                    document.getElementById('login-overlay').classList.add('flex'); 
                }
            } catch (err) { console.error(err); logout(); } finally {
                const loader = document.getElementById('loading');
                if(loader) { loader.classList.add('opacity-0'); setTimeout(() => loader.remove(), 700); }
                lucide.createIcons();
            }
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const btn = e.target.querySelector('button'); 
            btn.disabled = true; btn.innerText = "DOGRULANIYOR...";
            const { error } = await supabaseClient.auth.signInWithPassword({ 
                email: document.getElementById('login-email').value, 
                password: document.getElementById('login-password').value 
            });
            if (error) { 
                document.getElementById('login-error').innerText = "HATA: " + error.message; 
                document.getElementById('login-error').classList.remove('hidden'); 
                btn.disabled = false; btn.innerText = "Sisteme Bağlan"; 
            } 
            else { location.reload(); }
        }

        async function fetchData() {
            if(!userProfile) return;
            try {
                const [ {data: s}, {data: t}, {data: inv} ] = await Promise.all([

            const investTotal = investments.reduce((a, b) => a + (Number(b.quantity) * (Number(b.current_price) > 0 ? Number(b.current_price) : Number(b.average_cost))), 0);

            const hInv = document.getElementById('header-invest-total'); if(hInv) hInv.innerText = investTotal.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + ' ₺';

        // --- LIVE API & SCHEDULES ---
        async function checkScheduledUpdates() {
            const lastUpdateDate = localStorage.getItem('last_update_date');
            const updatedSlots = JSON.parse(localStorage.getItem('updated_slots') || "[]");
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const currentHourMin = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            if (lastUpdateDate !== today) {
                localStorage.setItem('last_update_date', today);
                localStorage.setItem('updated_slots', "[]");
            }

            const missedSlots = updateSlots.filter(slot => currentHourMin >= slot && !updatedSlots.includes(slot));
            if (missedSlots.length > 0) {
                const latestSlot = missedSlots[missedSlots.length - 1];
                await batchUpdatePrices();
                updatedSlots.push(latestSlot);
                localStorage.setItem('updated_slots', JSON.stringify(updatedSlots));
                const badge = document.getElementById('last-update-time');
                if(badge) badge.innerText = latestSlot;
            }
        }

        async function batchUpdatePrices() {
            const funds = investments.filter(i => i.asset_type === 'Fon');
            if(funds.length === 0) return;
            for(let f of funds) {
                try {
                    const response = await fetch(`https://tefas-api.p.rapidapi.com/api/v1/funds/${f.asset_name}`, {
                        method: 'GET',
                        headers: { 'x-rapidapi-key': RAPID_API_KEY, 'x-rapidapi-host': 'tefas-api.p.rapidapi.com' }
                    });
                    const result = await response.json();
                    if(result && result.price) {
                        await supabaseClient.from('investments').update({ current_price: result.price }).eq('id', f.id);
                    }
                } catch (e) { console.error(e); }
            }
            await fetchData();
        }

                    <div class="space-y-2 max-w-3xl mx-auto">${list.map(t => `<div class="p-5 liquid-inner border border-white/5 flex justify-between items-center rounded-2xl group"><div><p class="font-black text-white text-sm uppercase italic">${t.description}</p><p class="text-[9px] text-slate-500 font-bold uppercase mt-1">${new Date(t.transaction_date).toLocaleDateString('tr-TR')} • ${t.bank_name}</p></div><div class="flex items-center gap-4"><p class="text-lg font-black ${t.type==='income'?'text-purple-400':'text-pink-400'}">${t.type==='income'?'+':'-'}${Number(t.amount).toLocaleString('tr-TR')} ₺</p><button onclick="window.deleteItem('transactions', '${t.id}', fetchData)" class="opacity-0 group-hover:opacity-100 transition text-red-500/20 hover:text-red-500"><i class="fa-solid fa-trash-alt"></i></button></div></div>`).join('')}</div>
                </div>`;
            lucide.createIcons();
        }

        window.renderStudentsUI = () => {
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 view-frame" id="student-cari-zone"></div>`;
            document.getElementById('student-cari-zone').innerHTML = students.map(s => {
                const total = transactions.filter(t => t.student_id === s.id && t.type === 'income').reduce((a,b) => a + Number(b.amount), 0);
                return `<div class="glass-card p-10 rounded-[2.5rem] text-center group transition-all duration-500 hover:border-blue-500/30 relative overflow-hidden"><div class="w-16 h-16 rounded-[1.25rem] bg-blue-600/10 mx-auto flex items-center justify-center text-blue-500 text-2xl font-black mb-6 border-2 border-blue-500/20 shadow-inner group-hover:scale-110 transition-transform">${s.full_name[0]}</div><h4 class="text-lg font-black text-white uppercase italic mb-1 tracking-tighter">${s.full_name}</h4><p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mb-6 border-b border-white/5 pb-4">${s.email}</p><p class="text-[9px] font-black text-slate-500 uppercase mb-1 italic">Toplam Katkı</p><p class="text-2xl font-black text-emerald-400 drop-shadow-lg">${total.toLocaleString('tr-TR')} ₺</p></div>`;
            }).join('');
        };

        window.renderReportsUI = () => {
            const assetData = {}; let totalAllAssets = 0;
            investments.forEach(i => {
                const val = Number(i.quantity) * (Number(i.current_price) > 0 ? Number(i.current_price) : Number(i.average_cost));
                assetData[i.asset_type] = (assetData[i.asset_type] || 0) + val;
                totalAllAssets += val;
            });
            
            document.getElementById('view-content').innerHTML = `
                <div class="space-y-10 view-frame">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="glass-card p-8 rounded-[2rem] flex flex-col items-center min-h-[350px]"><h4 class="text-[9px] font-black uppercase text-slate-500 mb-6 border-b border-white/5 pb-2 w-full text-center tracking-widest italic">Gider Dağılımı</h4><canvas id="expenseChart"></canvas></div>
                        <div class="glass-card p-8 rounded-[2rem] flex flex-col items-center min-h-[350px]"><h4 class="text-[9px] font-black uppercase text-slate-500 mb-6 border-b border-white/5 pb-2 w-full text-center tracking-widest italic">Banka Mevcudiyeti</h4><canvas id="bankPieChart"></canvas></div>
                    </div>
                    <div class="glass-card p-8 rounded-[2rem] shadow-2xl"><h4 class="font-black uppercase text-[10px] text-slate-500 mb-8 border-b border-white/5 pb-3 italic flex justify-between tracking-widest">Varlık & Fon Dağılım Detayı <i data-lucide="pie-chart" class="w-4"></i></h4><div class="grid lg:grid-cols-12 gap-8 items-center"><div class="lg:col-span-4 h-64 flex items-center justify-center"><canvas id="reportsAssetChart"></canvas></div><div class="lg:col-span-8 overflow-x-auto custom-scrollbar"><table class="w-full text-left"><thead class="bg-black/20 text-[9px] font-black uppercase text-slate-500 border-b border-white/10"><tr><th class="p-5">Varlık</th><th class="p-5 text-right">Değer</th><th class="p-5 text-right">Pay (%)</th></tr></thead><tbody id="reports-inv-table" class="text-[10px] font-bold text-slate-300">
                        ${investments.map(i => {
                            const val = Number(i.quantity) * (Number(i.current_price) > 0 ? Number(i.current_price) : Number(i.average_cost));
                            const share = totalAllAssets > 0 ? (val / totalAllAssets * 100).toFixed(1) : 0;
                            return `<tr class="border-b border-white/5 hover:bg-white/5 transition"><td class="p-5 font-black uppercase text-white">${i.asset_name}</td><td class="p-5 text-right font-black text-emerald-400 text-sm">${val.toLocaleString('tr-TR')} ₺</td><td class="p-5 text-right font-black text-blue-500">%${share}</td></tr>`;
                        }).join('')}
                    </tbody></table></div></div></div>
                </div>`;
            
            const expData = {}; transactions.filter(t=>t.type==='expense' && !t.is_grandmother).forEach(t=>expData[t.category]=(expData[t.category]||0)+Number(t.amount));
            const bankData = {}; transactions.forEach(t=>bankData[t.bank_name]=(bankData[t.bank_name]||0)+(t.type==='income'?Number(t.amount):-Number(t.amount)));
            new Chart(document.getElementById('expenseChart'), { type: 'pie', data: { labels: Object.keys(expData), datasets: [{ data: Object.values(expData), backgroundColor: ['#ef4444','#f97316','#eab308','#8b5cf6','#ec4899','#06b6d4','#10b981'], borderWidth: 0 }] } });
            new Chart(document.getElementById('bankPieChart'), { type: 'doughnut', data: { labels: Object.keys(bankData), datasets: [{ data: Object.values(bankData), backgroundColor: ['#2563eb','#10b981','#8b5cf6','#ea580c','#ef4444','#ec4899'], borderWidth: 0 }] } });
            new Chart(document.getElementById('reportsAssetChart'), { type: 'doughnut', data: { labels: Object.keys(assetData), datasets: [{ data: Object.values(assetData), backgroundColor: ['#10b981','#2563eb','#f59e0b','#8b5cf6','#ef4444'], borderWidth: 0 }] }, options: { plugins: { legend: { display: false } } } });
        };

        window.deleteItem = async (tbl, id, cb) => { if(confirm("Onaylıyor musun Ali Hoca?")) { const { error } = await supabaseClient.from(tbl).delete().eq('id', id); if(!error) { await cb(); navigate(localStorage.getItem('student_last_tab')); } else alert(error.message); } };

        document.addEventListener('DOMContentLoaded', () => {
            initAuth();
            const loginForm = document.getElementById('login-form');
            if (loginForm) loginForm.onsubmit = handleLogin;
            const transactionForm = document.getElementById('transaction-form');
            if (transactionForm) transactionForm.onsubmit = window.saveTransaction;
        });
    </script>
</body>
</html>
