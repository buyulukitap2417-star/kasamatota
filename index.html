<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATOTA Kasa Pro | Finansal Komuta Merkezi v25.0 Titan</title>
    
    <!-- 
        MATOTA KASA PRO - ULTIMATE TITAN v25.0
        Ali Şengül Modern Eğitim Modeli - Finansal Terminal
        Features: Anti-Login Loop, Real-Time Market Feed, Student Box Cari, TEFAS API Fixed, Clean Dashboard
    -->

    <!-- Merkezi Kütüphane Hub'ı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6', emerald: '#10b981', red: '#ef4444' } 
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f8fafc;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; animation: moveOrb 25s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.2); } }

        /* --- MODERN CAM TASARIMI --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(25px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 0.75rem; }

        /* --- SIDEBAR FIX (KESİN SIKIŞTIRMA) --- */
        .sidebar-fixed { 
            position: fixed; top: 0; left: 0; height: 100vh; width: 240px; 
            z-index: 5000; display: flex; flex-direction: column;
            background: rgba(15, 23, 42, 0.98) !important; backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .sidebar-link { transition: all 0.3s ease; display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1.25rem; width: 220px; border-radius: 0.75rem; margin: 0.2rem 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; }
        .sidebar-link.active { background: linear-gradient(90deg, rgba(37, 99, 235, 0.2) 0%, transparent 100%) !important; color: #3b82f6 !important; border-left: 3px solid #2563eb !important; opacity: 1; }

        #app-main-area { margin-left: 240px; width: calc(100% - 240px); height: 100vh; display: flex; flex-direction: column; position: relative; }

        .student-box { cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .student-box:hover { transform: translateY(-5px); border-color: rgba(37, 99, 235, 0.4) !important; background: rgba(37, 99, 235, 0.05) !important; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }
        
        @media (max-width: 1024px) {
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row !important; z-index: 5001; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px !important; border-right: none; }
            #app-main-area { margin-left: 0; width: 100%; padding-bottom: 60px !important; }
            .sidebar-link { padding: 0.5rem; justify-content: center; width: auto; flex: 1; margin: 0; }
            .sidebar-link span { display: none; }
        }

        .view-fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Piyasa bandı kılıfı */
        .ticker-wrapper { width: 100%; height: 46px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 4000; overflow: hidden; }
    </style>
</head>
<body class="dark overflow-hidden">
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>

    <!-- LOADER -->
    <div id="loading" class="fixed inset-0 z-[6000] bg-darkBg flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="h-16 w-16 border-2 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-6 text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 animate-pulse text-center">TITAN HUB BAŞLATILIYOR</p>
    </div>

    <!-- GİRİŞ EKRANI -->
    <div id="login-overlay" class="fixed inset-0 z-[5500] bg-darkBg flex flex-col items-center justify-center p-6 hidden">
        <div class="max-w-md w-full glass-card p-12 rounded-[4rem] text-center border border-white/10 animate__animated animate__zoomIn">
            <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" class="h-14 mx-auto mb-10 drop-shadow-xl">
            <h3 class="text-2xl font-black text-white italic mb-10 uppercase tracking-widest">Yönetici Terminali</h3>
            <form id="login-form">
                <div class="space-y-5">
                    <input type="email" id="login-email" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 font-bold text-sm shadow-inner" placeholder="E-posta Adresiniz">
                    <input type="password" id="login-password" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/5 font-bold text-sm shadow-inner" placeholder="Şifreniz">
                    <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black uppercase shadow-lg hover:brightness-110 transition tracking-[0.2em]">SİSTEME BAĞLAN</button>
                </div>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-[10px] font-bold hidden uppercase text-center italic"></div>
        </div>
    </div>

    <!-- ANA PLATFORM -->
    <div id="app" class="hidden min-h-screen flex flex-col md:flex-row overflow-hidden relative z-10">
        
        <!-- YAN MENÜ -->
        <aside class="sidebar-fixed shadow-2xl">
            <div class="p-6 text-center flex justify-center items-center h-28 shrink-0">
                <img src="https://tnhofdyonpbmozqzimzj.supabase.co/storage/v1/object/public/logos/acik.png" alt="MATOTA" class="h-10 w-auto object-contain drop-shadow-xl">
            </div>
            <nav class="flex-1 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>
            <div class="p-4 border-t border-white/5 shrink-0">
                <div class="flex items-center gap-3 mb-4 px-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-black text-sm" id="user-avatar">A</div>
                    <div class="overflow-hidden"><p class="text-[11px] font-black truncate text-white" id="user-name-display">...</p></div>
                </div>
                <button onclick="logout()" class="w-full py-2.5 text-red-500 hover:bg-red-500/10 rounded-xl font-black text-[9px] uppercase transition border border-red-500/10 tracking-widest">Çıkış Yap</button>
            </div>
        </aside>

        <!-- ANA İÇERİK ALANI -->
        <main class="flex-1 h-screen flex flex-col relative overflow-hidden" id="app-main-area">
            <!-- %100 GERÇEK TRADINGVIEW TICKER BANDI -->
            <div class="ticker-wrapper shrink-0">
                <div id="tradingview_ticker_tape" class="h-full"></div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <header class="p-6 md:px-10 md:pt-10 flex justify-between items-center h-24 shrink-0" id="main-header">
                    <div>
                        <h1 class="text-xl md:text-3xl font-black text-white italic uppercase tracking-tighter" id="page-title">...</h1>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1 italic" id="page-subtitle">Rasyonel Finansal İstihbarat</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="px-5 py-2 liquid-inner border border-white/10 rounded-2xl font-black text-[11px] text-emerald-400 hidden sm:flex flex-col items-center shadow-2xl">
                            <span class="opacity-50 text-[8px] uppercase tracking-widest text-center">Toplam Birikim</span>
                            <span id="header-invest-total" class="text-white text-base font-mono">0 ₺</span>
                        </div>
                        <button onclick="openTransactionModal()" class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-2xl hover:scale-105 transition-all border border-white/10">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                    </div>
                </header>
                
                <div id="view-content" class="w-full px-6 md:px-10 pb-10 max-w-7xl mx-auto view-fade"></div>
            </div>
        </main>
    </div>

    <!-- MODALLAR -->
    
    <!-- Öğrenci Detay & Cari PopUp -->
    <div id="student-detail-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl hidden items-center justify-center p-4 z-[9999]" onclick="if(event.target === this) window.closeModal('student-detail-modal')">
        <div class="max-w-4xl w-full glass-card p-10 rounded-[3.5rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn animate__faster flex flex-col">
            <button onclick="window.closeModal('student-detail-modal')" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-8 h-8"></i></button>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6 border-b border-white/10 pb-6 shrink-0">
                <div>
                    <h3 class="text-3xl font-black uppercase text-blue-500 italic tracking-tighter" id="detail-student-name">...</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">Aidat Ödeme Takvimi</p>
                </div>
                <div class="flex flex-wrap items-center gap-4 liquid-inner p-4 rounded-2xl border border-white/10">
                    <div class="w-32">
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Yıl</label>
                        <select id="detail-year-select" class="bg-transparent text-sm font-black text-white outline-none w-full" onchange="window.loadStudentMonthGrid()">
                            <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Ücret (₺)</label>
                        <input type="number" id="detail-monthly-fee" class="bg-transparent text-xl font-black text-white outline-none w-28 border-b border-white/10" onchange="window.updateStudentFee()">
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="detail-sync-kasa" checked class="w-5 h-5 rounded border-white/10 bg-white/5 text-blue-600">
                        <label for="detail-sync-kasa" class="text-[10px] font-black text-slate-400 uppercase leading-none">Kasaya<br>Mühürle</label>
                    </div>
                </div>
            </div>
            <div id="detail-month-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-y-auto custom-scrollbar flex-1 pr-2"></div>
        </div>
    </div>

    <!-- Arşivleme Modalı -->
    <div id="archive-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl hidden items-center justify-center p-4 z-[9999]" onclick="if(event.target === this) window.closeModal('archive-modal')">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn">
            <button onclick="window.closeModal('archive-modal')" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h3 class="text-2xl font-black uppercase text-orange-500 mb-2 italic tracking-tighter text-center">Mezuniyet Notu</h3>
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-8 text-center tracking-widest">Öğrenci başarısını mühürleyin</p>
            <form id="archive-form" onsubmit="window.submitArchive(event)">
                <input type="hidden" id="archive-student-id">
                <textarea id="archive-notes" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/10 h-40 font-medium shadow-inner" placeholder="Örn: LGS 480 Puan - Fen Lisesi kazandı."></textarea>
                <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-3xl font-black uppercase shadow-lg mt-6 hover:brightness-110 tracking-widest text-xs transition">ARŞİVE TAŞI</button>
            </form>
        </div>
    </div>

    <!-- İşlem Kayıt Modalı -->
    <div id="transaction-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]" onclick="if(event.target === this) window.closeModal('transaction-modal')">
        <div class="max-w-xl w-full glass-card p-10 rounded-[2.5rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn animate__faster">
            <button onclick="window.closeModal('transaction-modal')" class="absolute top-10 right-10 text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-8 h-8"></i></button>
            <h3 class="text-2xl font-black uppercase text-blue-500 mb-10 text-center tracking-tighter">İşlem Girişi</h3>
            <form id="transaction-form" onsubmit="window.saveTransaction(event)" class="space-y-4">
                <input type="hidden" id="editing-id" value="">
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="setType('income')" id="btn-inc" class="py-4 rounded-xl border-2 font-black text-sm uppercase transition bg-blue-600 border-blue-500/30 text-white shadow-lg">GELİR (+)</button>
                    <button type="button" onclick="setType('expense')" id="btn-exp" class="py-4 rounded-xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm">GİDER (-)</button>
                </div>
                <input type="hidden" id="t-type" value="income">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Kategori</label><select id="t-category" required class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-xs font-bold uppercase focus:border-blue-500"></select></div>
                    <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Banka / Hub</label><select id="t-bank" required class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-xs font-bold uppercase focus:border-blue-500"><option>Nays</option><option>İş Bankası</option><option>Halkbank</option><option>Garanti BBVA</option><option>YapıKredi</option><option>Nakit / Elden</option></select></div>
                </div>
                <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">İlişkili Kayıt</label><select id="t-student" class="w-full p-3 rounded-lg liquid-inner outline-none text-white border border-white/10 text-xs font-bold focus:border-blue-500 transition shadow-inner"></select></div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-1"><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Tutar (₺)</label><input type="number" step="0.01" id="t-amount" required class="w-full p-3 rounded-lg liquid-inner text-center font-black text-xl text-white outline-none border border-white/10 focus:border-blue-500 shadow-inner"></div>
                    <div class="col-span-2"><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Açıklama</label><input type="text" id="t-desc" required class="w-full p-3 rounded-xl liquid-inner text-white outline-none border border-white/10 focus:border-blue-500 transition font-medium text-sm"></div>
                </div>
                <button type="submit" id="save-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-2xl hover:brightness-110 border border-white/10 tracking-[0.2em] text-sm">İŞLEMİ KAYDET</button>
            </form>
        </div>
    </div>

    <!-- Yatırım Modalı -->
    <div id="investment-modal" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]" onclick="if(event.target === this) window.closeModal('investment-modal')">
        <div class="max-w-2xl w-full glass-card p-10 rounded-[3rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn">
            <button onclick="window.closeModal('investment-modal')" class="absolute top-10 right-10 text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-8 h-8"></i></button>
            <h3 class="text-2xl font-black uppercase text-emerald-500 mb-8 text-center italic tracking-tighter">Varlık Girişi</h3>
            <form id="investment-form" onsubmit="window.saveInvestment(event)" class="space-y-4">
                <input type="hidden" id="edit-inv-id" value="">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Varlık Kodu</label>
                        <div class="flex gap-2">
                             <input type="text" id="inv-name" required class="flex-1 p-3 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-black uppercase" placeholder="AFT, TUA, SASA..">
                             <button type="button" onclick="window.fetchLivePrice()" class="px-4 py-2 bg-blue-600 rounded-xl text-white font-black text-[9px] uppercase shadow-md hover:bg-blue-700 transition" id="api-fetch-btn" title="TEFAS'tan Çek"><i data-lucide="zap" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Tür</label><select id="inv-type" required class="w-full p-3 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-bold uppercase transition focus:border-emerald-500"><option>Fon</option><option>Hisse Senedi</option><option>Altın</option><option>Döviz</option><option>Kripto Para</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Adet</label><input type="number" step="0.000001" id="inv-qty" required class="w-full p-3 rounded-xl liquid-inner outline-none text-white border border-white/10 font-black text-lg shadow-inner"></div>
                    <div><label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Alış Maliyeti</label><input type="number" step="0.0001" id="inv-cost" required class="w-full p-3 rounded-xl liquid-inner outline-none text-white border border-white/10 font-black text-lg shadow-inner"></div>
                </div>
                <div><label class="text-[9px] font-black text-orange-500 uppercase block mb-1 italic tracking-widest">Anlık Piyasa Fiyatı (₺)</label><input type="number" step="0.0001" id="inv-current" class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-orange-500/20 font-black text-xl focus:border-orange-500 shadow-2xl"></div>
                <button type="submit" id="inv-save-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg hover:brightness-110 tracking-widest text-[11px] border border-white/10 mt-4 transition">YATIRIMI KAYDET</button>
            </form>
        </div>
    </div>

    <!-- Yeni Takip Modalı -->
    <div id="new-track-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl hidden items-center justify-center p-4 z-[9999]" onclick="if(event.target === this) window.closeModal('new-track-modal')">
        <div class="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl relative border border-white/15 animate__animated animate__zoomIn">
            <button onclick="window.closeModal('new-track-modal')" class="absolute top-8 right-8 text-slate-500 hover:text-white transition"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h3 class="text-2xl font-black uppercase text-orange-500 mb-6 text-center italic tracking-tighter">Yeni Takip Mührü</h3>
            <form id="new-track-form" onsubmit="window.saveTrackedSymbol(event)" class="space-y-5 text-left">
                <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Görünüm İsmi</label><input type="text" id="track-name" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 font-bold" placeholder="Örn: Bitcoin, Tüpraş.."></div>
                <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">TradingView Kodu</label><input type="text" id="track-symbol" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 font-mono" placeholder="Örn: BINANCE:BTCUSDT, BIST:TUPRS"></div>
                <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg hover:brightness-110 tracking-widest text-[11px]">LİSTEYE EKLE</button>
            </form>
        </div>
    </div>

    <!-- Sade Grafik Modalı -->
    <div id="market-detail-modal" class="fixed inset-0 bg-slate-950/98 backdrop-blur-3xl hidden items-center justify-center p-4 sm:p-12 z-[9999]" onclick="if(event.target === this) window.closeModal('market-detail-modal')">
        <div class="w-full max-w-5xl h-[85vh] glass-card rounded-[3.5rem] shadow-2xl flex flex-col overflow-hidden relative border border-white/15 animate__animated animate__zoomIn">
            <div class="p-6 border-b border-white/10 flex justify-between items-center liquid-inner shrink-0 shadow-2xl">
                <div>
                    <h3 class="text-3xl font-black text-white uppercase italic tracking-tighter" id="market-chart-title">Analiz</h3>
                    <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.6em] mt-1 italic">Rasyonel Piyasa İzleme</p>
                </div>

                const { error } = await supabaseClient.from('transactions').insert([payload]);
                if(!error) { await fetchData(); window.closeModal('transaction-modal'); navigate('dashboard'); } else throw error;
            } catch(err) { alert(err.message); btn.disabled = false; btn.innerText = "İŞLEMİ MÜHÜRLE"; }
        };

        window.saveInvestment = async (e) => {
            e.preventDefault(); const btn = document.getElementById('inv-save-btn'); btn.disabled = true;
            const editId = document.getElementById('edit-inv-id').value;
            const data = { teacher_id: userProfile.id, asset_name: document.getElementById('inv-name').value.toUpperCase(), asset_type: document.getElementById('inv-type').value, quantity: Number(document.getElementById('inv-qty').value), average_cost: Number(document.getElementById('inv-cost').value), current_price: Number(document.getElementById('inv-current').value || 0) };
            const req = editId ? supabaseClient.from('investments').update(data).eq('id', editId) : supabaseClient.from('investments').insert([data]);
            const { error } = await req;
            if(!error) { await fetchData(); window.closeModal('investment-modal'); navigate('investments'); } else alert(error.message);
            btn.disabled = false;
        };

        window.renderInvestmentsUI = () => {
            document.getElementById('view-content').innerHTML = `<div class="space-y-8 view-frame"><div class="flex justify-between items-center glass-card p-6 rounded-3xl shadow-xl"><div><h2 class="text-2xl font-black text-emerald-400 uppercase italic tracking-tighter">Varlık Laboratuvarı</h2><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Kişisel Fon ve Hisse Pozisyonlarınız</p></div><button onclick="openInvestmentModal()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg border border-white/10 hover:scale-105 transition"><i data-lucide="plus" class="mr-2 inline w-4 h-4"></i>VARLIK EKLE</button></div><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="inv-grid"></div></div>`;
            document.getElementById('inv-grid').innerHTML = investments.map(i => {
                const cost = Number(i.quantity) * Number(i.average_cost); const curr = Number(i.quantity) * (Number(i.current_price) > 0 ? Number(i.current_price) : Number(i.average_cost));
                const pnl = curr - cost; const isProfit = pnl >= 0;
                let tvSymbol = i.asset_name; if (i.asset_type === 'Hisse Senedi') tvSymbol = `BIST:${i.asset_name}`; else if (i.asset_type === 'Altın') tvSymbol = 'FX_IDC:XAUTRY'; else if (i.asset_type === 'Fon') { if(i.asset_name.includes("ALTIN") || i.asset_name === "TUA") tvSymbol = 'FX_IDC:XAUTRY'; else tvSymbol = 'BIST:XU100'; }
                return `<div class="glass-card p-8 rounded-[2.5rem] border-t-8 ${isProfit?'border-t-emerald-500':'border-t-red-500'} relative group h-full flex flex-col justify-between transition-all hover:border-white/20 shadow-xl"><div class="flex justify-between items-start mb-6 relative z-10"><span class="asset-badge">${i.asset_type}</span><div class="flex gap-2"><button onclick="window.openMarketChart('${i.asset_name}', '${tvSymbol}')" class="w-8 h-8 rounded-lg liquid-inner flex items-center justify-center text-orange-400 hover:text-white transition shadow-sm"><i data-lucide="area-chart" class="w-4 h-4"></i></button><button onclick="window.editInv('${i.id}')" class="w-8 h-8 rounded-lg liquid-inner flex items-center justify-center text-slate-500 hover:text-blue-500 transition shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="window.deleteItem('investments', '${i.id}', fetchData)" class="w-8 h-8 rounded-lg liquid-inner flex items-center justify-center text-slate-500 hover:text-red-500 transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div><h4 class="text-xl font-black text-white uppercase italic tracking-tighter mb-4 line-clamp-1">${i.asset_name}</h4><div class="flex justify-between items-end border-t border-white/5 pt-4 relative z-10"><div><p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Piyasa Değeri</p><p class="text-xl font-black text-white">${curr.toLocaleString('tr-TR')} ₺</p></div><div class="text-right"><p class="text-[8px] font-black ${isProfit?'text-emerald-400':'text-red-400'} uppercase tracking-widest mb-1">K/Z</p><p class="text-base font-black ${isProfit?'text-emerald-400':'text-red-500'}">${isProfit?'+':''}${pnl.toLocaleString('tr-TR', { maximumFractionDigits: 2 })} ₺</p></div></div></div>`;
            }).join('') || '<p class="col-span-full py-16 text-center opacity-30 italic font-black uppercase text-xs">Varlık bulunmuyor.</p>';
            lucide.createIcons();
        }

        async function checkScheduledUpdates() {
            const lastDate = localStorage.getItem('last_update_date'); const slots = JSON.parse(localStorage.getItem('updated_slots') || "[]");
            const now = new Date(); const today = now.toISOString().split('T')[0];
            const curHM = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (lastDate !== today) { localStorage.setItem('last_update_date', today); localStorage.setItem('updated_slots', "[]"); }
            const missedSlots = updateSlots.filter(slot => curHM >= slot && !slots.includes(slot));
            if (missedSlots.length > 0) { const latestSlot = missedSlots[missedSlots.length - 1]; await batchUpdatePrices(); slots.push(latestSlot); localStorage.setItem('updated_slots', JSON.stringify(slots)); }
        }

        async function batchUpdatePrices() {
            const funds = investments.filter(i => i.asset_type === 'Fon');
            for(let f of funds) {
                try {
                    const r = await fetch(`https://tefas-api.p.rapidapi.com/api/v1/funds/${f.asset_name}`, { headers: { 'x-rapidapi-key': RAPID_API_KEY, 'x-rapidapi-host': 'tefas-api.p.rapidapi.com' } });
                    const res = await r.json(); if(res && res.price) await supabaseClient.from('investments').update({ current_price: res.price }).eq('id', f.id);
                } catch (e) {}
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => { initAuth(); const loginForm = document.getElementById('login-form'); if (loginForm) loginForm.onsubmit = handleLogin; });
    </script>
</body>
</html>
