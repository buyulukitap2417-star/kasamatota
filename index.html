    <script>
        // ==========================================
        // PLATFORM CORE JS (v13.5 MARKET HUB)
        // ==========================================
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const RAPID_API_KEY = "d17d7ed7dfmshcd76628704114c6p12384ajsn114c217a2582";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = null, students = [], transactions = [], investments = [], trackedSymbols = [];
        let dashboardAssetChart = null, marketDataInterval = null;
        const updateSlots = ["09:00", "12:00", "16:00", "19:00", "22:00"];

        const incCats = ['Kurs Ücreti', 'Özel Ders', 'Kitap Satışı', 'Cashback', 'İade', 'Harçlık', 'Babaannemden Gelen', 'Diğer Gelir'];
        const expCats = ['Market', 'Abonelik', 'Fatura', 'Harçlık', 'Online Alışveriş', 'Yemek Harcamaları', 'Kira', 'Elektrik/Su/İnternet', 'Reklam', 'Hizmet/Personel', 'Babaannem İçin', 'Diğer Gider'];

        // --- UI & MODAL ENGINE ---
        window.closeModal = function(id) { 
            const el = document.getElementById(id);
            if(el) {
                el.style.display = 'none';
                el.classList.add('hidden'); 
                el.classList.remove('flex'); 
                if(id === 'market-detail-modal') document.getElementById('tradingview-container').innerHTML = '';
            }
        };

        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }
        function openTransactionModal() { document.getElementById('editing-id').value = ""; document.getElementById('transaction-form').reset(); document.getElementById('transaction-modal').classList.remove('hidden'); document.getElementById('transaction-modal').style.display = 'flex'; setType('income'); lucide.createIcons(); }
        function openInvestmentModal() { document.getElementById('edit-inv-id').value = ""; document.getElementById('investment-form').reset(); document.getElementById('investment-modal').classList.remove('hidden'); document.getElementById('investment-modal').style.display = 'flex'; lucide.createIcons(); }
        function openNewTrackModal() { document.getElementById('new-track-form').reset(); document.getElementById('new-track-modal').classList.remove('hidden'); document.getElementById('new-track-modal').style.display = 'flex'; }

        // --- AUTH ---
        async function initAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (data && data.role === 'teacher') {
                        userProfile = data;
                        document.getElementById('user-name-display').innerText = data.full_name;
                        document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                        document.getElementById('app').classList.remove('hidden'); 
                        document.getElementById('app').classList.add('flex');
                        const lo = document.getElementById('login-overlay');
                        if(lo) { lo.style.display = 'none'; lo.classList.add('hidden'); }
                        await fetchData();
                        await checkScheduledUpdates();

            const { error } = await supabaseClient.auth.signInWithPassword({

                password: document.getElementById('login-password').value

        async function fetchData() {
            if(!userProfile) return;
            try {
                const [ {data: s}, {data: t}, {data: inv}, {data: trk} ] = await Promise.all([
                    supabaseClient.from('profiles').select('*').eq('role', 'student').eq('teacher_id', userProfile.id).order('full_name'),
                    supabaseClient.from('transactions').select('*, profiles!transactions_student_id_fkey(full_name)').eq('teacher_id', userProfile.id).order('transaction_date', {ascending: false}),
                    supabaseClient.from('investments').select('*').eq('teacher_id', userProfile.id).order('asset_name'),
                    supabaseClient.from('tracked_symbols').select('*').eq('teacher_id', userProfile.id).order('created_at', {ascending: true})
                ]);
                students = s || []; transactions = t || []; investments = inv || []; trackedSymbols = trk || [];
                
                const stSel = document.getElementById('t-student');
                if (stSel) stSel.innerHTML = '<option value="">Şahsi İşlem</option><option value="babaanne">BABAANNE (Özel)</option>' + students.map(st => `<option value="${st.id}">${st.full_name}</option>`).join('');
                updateStats();
            } catch(err) { console.error("FetchData Error:", err); }
        }

        function updateStats() {
            const personal = transactions.filter(t => !t.is_grandmother);
            const totalBal = personal.reduce((acc, curr) => curr.type === 'income' ? acc + Number(curr.amount) : acc - Number(curr.amount), 0);
            const investTotal = investments.reduce((a, b) => a + (Number(b.quantity) * (Number(b.current_price) > 0 ? Number(b.current_price) : Number(b.average_cost))), 0);
            const hInv = document.getElementById('header-invest-total'); if(hInv) hInv.innerText = investTotal.toLocaleString('tr-TR', { minimumFractionDigits: 2 }) + ' ₺';
            const hScore = document.getElementById('header-score'); if(hScore) hScore.innerText = totalBal.toLocaleString('tr-TR');
        }

            localStorage.setItem('student_last_tab', v);
            const cont = document.getElementById('view-content');
            cont.innerHTML = '<div class="p-20 flex justify-center items-center"><i class="fa-solid fa-atom fa-spin text-4xl text-blue-600"></i></div>';
            
            if (marketDataInterval) clearInterval(marketDataInterval);

                else if(v === 'students') renderStudentsUI();
                else if(v === 'grandmother') renderGrandmotherUI();
                else if(v === 'reports') renderReportsUI();
                lucide.createIcons();
            }, 50);
        }

                                <div class="glass-card p-6 rounded-2xl border-l-4 border-l-red-500 shadow-lg text-center"><p class="text-[8px] font-black uppercase text-slate-500 mb-1 tracking-widest">Gider (Ay)</p><p class="text-lg font-black text-red-500">${mExp.toLocaleString('tr-TR')} ₺</p></div>
                            </div>

                                <div class="text-right"><p class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Anlık Değer</p><p class="text-xl font-black text-emerald-400">${totalCurrent.toLocaleString('tr-TR')} ₺</p></div>
                                <div class="col-span-2 p-4 liquid-inner rounded-xl flex justify-between items-center mt-2 shadow-inner border border-white/5">
                                    <div><p class="text-[8px] font-black text-slate-500 uppercase italic">Net Birikim Gücü</p><p class="text-lg font-black ${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-500'}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toLocaleString('tr-TR')} ₺</p></div>
                                    <div class="text-right"><p class="text-[8px] font-black text-slate-500 uppercase italic">Verim</p><p class="text-lg font-black ${totalPnl >= 0 ? 'text-emerald-400' : 'text-red-500'} italic">%${totalPnl >= 0 ? '+' : ''}${pnlRate.toFixed(2)}</p></div>

            new Chart(document.getElementById('expenseChart'), { type: 'pie', data: { labels: Object.keys(expData), datasets: [{ data: Object.values(expData), backgroundColor: ['#ef4444','#f97316','#eab308','#8b5cf6','#ec4899','#06b6d4','#10b981'], borderWidth: 0 }] } });
            new Chart(document.getElementById('bankPieChart'), { type: 'doughnut', data: { labels: Object.keys(bankData), datasets: [{ data: Object.values(bankData), backgroundColor: ['#2563eb','#10b981','#8b5cf6','#ea580c','#ef4444','#ec4899'], borderWidth: 0 }] } });
            new Chart(document.getElementById('reportsAssetChart'), { type: 'doughnut', data: { labels: Object.keys(assetData), datasets: [{ data: Object.values(assetData), backgroundColor: ['#10b981','#2563eb','#f59e0b','#8b5cf6','#ef4444'], borderWidth: 0 }] }, options: { plugins: { legend: { display: false } } } });
        };

        function setType(type) { document.getElementById('t-type').value = type; const isInc = type === 'income'; document.getElementById('btn-inc').className = isInc ? 'py-4 rounded-xl border-2 font-black text-sm uppercase transition bg-blue-600 border-blue-500/30 text-white' : 'py-4 rounded-xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500'; document.getElementById('btn-exp').className = !isInc ? 'py-4 rounded-xl border-2 font-black text-sm uppercase transition bg-red-600 border-red-500/30 text-white' : 'py-4 rounded-xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500'; document.getElementById('t-category').innerHTML = (isInc ? incCats : expCats).map(c => `<option value="${c}">${c}</option>`).join(''); }

        document.addEventListener('DOMContentLoaded', () => { initAuth(); });
    </script>
</body>
</html>
