<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA Kasa Pro | Finansal Komuta Merkezi v9.0</title>
    
    <!-- Merkezi Kütüphane Hub'ı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#020617', 
                        darkCard: '#0f172a', 
                        brand: { blue: '#2563eb', orange: '#ea580c', purple: '#8b5cf6', emerald: '#10b981', red: '#ef4444' } 
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'floating 3s ease-in-out infinite',
                    },
                    keyframes: {
                        floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                } 
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        /* --- CORE ESTETİK --- */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; animation: moveOrb 25s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 45vw; height: 45vw; background: #1d4ed8; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #7c2d12; bottom: -10%; right: -10%; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.2); } }

        /* --- MODERN CAM TASARIMI --- */
        .glass-card {
            background: rgba(15, 23, 42, 0.5) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02) !important;
            transition: all 0.4s ease;
        }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.7); }
        .liquid-inner { background: rgba(0, 0, 0, 0.3) !important; backdrop-filter: blur(10px) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 1rem; }

        /* --- MENÜ SEÇİM VURGUSU --- */
        .sidebar-link { transition: all 0.3s ease; border-left: 0px solid transparent; }
        .sidebar-link.active { 
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.15) 0%, transparent 100%) !important;
            color: #3b82f6 !important;
            border-left: 4px solid #2563eb !important;
            padding-left: 1.75rem !important;
            box-shadow: inset 10px 0 20px -10px rgba(37, 99, 235, 0.2);
        }
        .sidebar-link.active i { color: #3b82f6 !important; }

        /* --- TAB CONTENT --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ERGONOMİK AYARLAR --- */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37, 99, 235, 0.3); border-radius: 10px; }
        .view-frame { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; }

        /* --- BADGES --- */
        .stat-badge { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .asset-badge { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 10px; border-radius: 8px; background: rgba(37, 99, 235, 0.1); color: #3b82f6; border: 1px solid rgba(37, 99, 235, 0.2); }

        .logo-fixed { position: fixed; top: 24px; left: 32px; z-index: 2000; filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.4)); pointer-events: auto; }

        @media (max-width: 1024px) {
            .sidebar-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; flex-direction: row !important; z-index: 2001; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px !important; }
            .sidebar-link span { display: none; }
            .logo-fixed { top: 16px; left: 16px; }
            main { padding-bottom: 90px !important; }
        }
    </style>
</head>

            <button onclick="closeModal('transaction-modal')" class="absolute top-10 right-10 text-slate-500 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-black uppercase text-blue-500 mb-10 text-center tracking-tighter">İşlem Mühürleme</h3>
            <form id="transaction-form" onsubmit="window.saveTransaction(event)" class="space-y-5">
                <input type="hidden" id="editing-id" value="">

                    <button type="button" onclick="setType('expense')" id="btn-exp" class="py-5 rounded-2xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm">GİDER (-)</button>

                    <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Banka Hub</label><select id="t-bank" required class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-bold uppercase transition focus:border-blue-500"><option>Nays</option><option>İş Bankası</option><option>Halkbank</option><option>Garanti BBVA</option><option>YapıKredi</option><option>Nakit / Elden</option></select></div>
                </div>
                <div><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">İlişkili Kayıt (Öğrenci veya Özel)</label><select id="t-student" class="w-full p-4 rounded-xl liquid-inner outline-none text-white border border-white/10 text-xs font-bold focus:border-blue-500 transition shadow-inner"></select></div>

                    <div class="col-span-2"><label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Açıklama</label><input type="text" id="t-desc" required class="w-full p-4 rounded-xl liquid-inner text-white outline-none border border-white/10 focus:border-blue-500 transition font-medium"></div>

    <!-- Yatırım / Fon / Varlık Modalı -->

                    <div><label class="text-[10px] font-black text-slate-500 uppercase block mb-2">Birim Alış Maliyeti (₺)</label><input type="number" step="0.0001" id="inv-cost" required class="w-full p-5 rounded-2xl liquid-inner outline-none text-white border border-white/10 font-black text-2xl shadow-inner" placeholder="0.00"></div>
                </div>
                <div><label class="text-[10px] font-black text-orange-500 uppercase block mb-2 tracking-widest italic">Anlık Piyasa Fiyatı (₺)</label><input type="number" step="0.0001" id="inv-current" class="w-full p-6 rounded-3xl liquid-inner outline-none text-white border border-orange-500/20 font-black text-3xl focus:border-orange-500 shadow-2xl" placeholder="0.0000"></div>
                <button type="submit" id="inv-save-btn" class="w-full bg-emerald-600 text-white py-7 rounded-[3rem] font-black uppercase shadow-2xl hover:brightness-110 tracking-[0.5em] text-sm border border-white/10">VARLIĞI MÜHÜRLE</button>

        </div>

    <script>
        const SUPABASE_URL = "https://tnhofdyonpbmozqzimzj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_xVFfpA85IjnCqIjEJWvtvQ_VZCH_n60"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userProfile = null, students = [], transactions = [], investments = [];
        let dashboardAssetChart = null;

        const incCats = ['Kurs Ücreti', 'Özel Ders', 'Kitap Satışı', 'Cashback', 'İade', 'Harçlık', 'Babaannemden Gelen', 'Diğer Gelir'];
        const expCats = ['Market', 'Abonelik', 'Fatura', 'Harçlık', 'Online Alışveriş', 'Yemek Harcamaları', 'Kira', 'Elektrik/Su/İnternet', 'Reklam', 'Hizmet/Personel', 'Babaannem İçin', 'Diğer Gider'];

        // CORE UI & AUTH
        function logout() { localStorage.clear(); supabaseClient.auth.signOut().then(() => location.reload()); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function openTransactionModal() { document.getElementById('editing-id').value = ""; document.getElementById('transaction-form').reset(); document.getElementById('transaction-modal').classList.remove('hidden'); document.getElementById('transaction-modal').classList.add('flex'); setType('income'); lucide.createIcons(); }
        function openInvestmentModal() { document.getElementById('edit-inv-id').value = ""; document.getElementById('investment-form').reset(); document.getElementById('investment-modal').classList.remove('hidden'); document.getElementById('investment-modal').classList.add('flex'); lucide.createIcons(); }

        async function initAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                    if (data && data.role === 'teacher') {
                        userProfile = data;
                        document.getElementById('user-name-display').innerText = data.full_name;
                        document.getElementById('user-avatar').innerText = data.full_name[0].toUpperCase();
                        document.getElementById('app').classList.remove('hidden'); document.getElementById('app').classList.add('flex');
                        document.getElementById('login-overlay').classList.add('hidden');
                        renderSidebar(); await fetchData();
                        navigate(localStorage.getItem('student_last_tab') || 'dashboard');
                    } else { logout(); }
                } else { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('login-overlay').classList.add('flex'); }
            } catch (err) {
                console.error("Critical Auth Error:", err);
                logout();
            } finally {
                const loader = document.getElementById('loading');
                if(loader) { loader.classList.add('opacity-0'); setTimeout(() => loader.remove(), 700); }
                lucide.createIcons();
            }
        }

        async function handleLogin(e) {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "DOĞRULANIYOR...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            if (error) { document.getElementById('login-error').innerText = "ERİŞİM REDDEDİLDİ: " + error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Sisteme Bağlan"; } 
            else { location.reload(); }
        }

        async function fetchData() {
            const [ {data: s}, {data: t}, {data: inv} ] = await Promise.all([
                supabaseClient.from('profiles').select('*').eq('role', 'student').order('full_name'),
                supabaseClient.from('transactions').select('*, profiles!transactions_student_id_fkey(full_name)').order('transaction_date', {ascending: false}),
                supabaseClient.from('investments').select('*').order('asset_name')
            ]);
            students = s || []; transactions = t || []; investments = inv || [];
            
            const studentSelect = document.getElementById('t-student');
            if (studentSelect) {
                studentSelect.innerHTML = '<option value="">Şahsi İşlem</option><option value="babaanne">BABAANNE (Özel)</option>' + students.map(st => `<option value="${st.id}">${st.full_name}</option>`).join('');
            }
            updateStats();
        }

        function updateStats() {
            const personalTrans = transactions.filter(t => t.is_grandmother !== true);
            const mInc = personalTrans.filter(t => t.type === 'income' && new Date(t.transaction_date).getMonth() === new Date().getMonth()).reduce((a, b) => a + Number(b.amount), 0);
            const mExp = personalTrans.filter(t => t.type === 'expense' && new Date(t.transaction_date).getMonth() === new Date().getMonth()).reduce((a, b) => a + Number(b.amount), 0);
            const totalBal = personalTrans.reduce((acc, curr) => curr.type === 'income' ? acc + Number(curr.amount) : acc - Number(curr.amount), 0);
            
            const investTotal = investments.reduce((a, b) => {
                const price = Number(b.current_price) > 0 ? Number(b.current_price) : Number(b.average_cost);
                return a + (Number(b.quantity) * price);
            }, 0);

            const ids = ['stat-month-income', 'stat-month-expense', 'stat-invest-total', 'header-invest-total', 'stat-total-balance', 'header-score'];
            const vals = [mInc.toLocaleString('tr-TR')+' ₺', mExp.toLocaleString('tr-TR')+' ₺', investTotal.toLocaleString('tr-TR')+' ₺', investTotal.toLocaleString('tr-TR')+' ₺', totalBal.toLocaleString('tr-TR')+' ₺', totalBal.toLocaleString('tr-TR')];
            
            ids.forEach((id, i) => { const el = document.getElementById(id); if(el) el.innerText = vals[i]; });
        }

        function renderSidebar() {
            const items = [{id:'dashboard',n:'Dashboard',i:'layout-dashboard'},{id:'ledger',n:'İşlem Defteri',i:'book-text'},{id:'investments',n:'Yatırımlarım',i:'vault'},{id:'students',n:'Öğrenci Cari',i:'users'},{id:'grandmother',n:'Babaanne',i:'heart'},{id:'reports',n:'Analiz',i:'pie-chart'}];
            document.getElementById('sidebar-nav').innerHTML = items.map(x => `<button onclick="navigate('${x.id}')" id="nav-${x.id}" class="sidebar-link w-full flex items-center space-x-5 px-8 py-5 rounded-[2.2rem] font-black text-[11px] uppercase tracking-widest transition hover:bg-white/5 group"><i data-lucide="${x.i}" class="w-6 h-6"></i><span>${x.n}</span></button>`).join('');
            lucide.createIcons();
        }

        function navigate(v) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const nBtn = document.getElementById('nav-'+v); if(nBtn) nBtn.classList.add('active');
            localStorage.setItem('student_last_tab', v);
            const cont = document.getElementById('view-content');

            const expData = {}; transactions.filter(t=>t.type==='expense' && !t.is_grandmother).forEach(t=>expData[t.category]=(expData[t.category]||0)+Number(t.amount));
            const bankData = {}; transactions.forEach(t=>bankData[t.bank_name]=(bankData[t.bank_name]||0)+(t.type==='income'?Number(t.amount):-Number(t.amount)));
            
            new Chart(document.getElementById('expenseChart'), { type: 'pie', data: { labels: Object.keys(expData), datasets: [{ data: Object.values(expData), backgroundColor: ['#ef4444','#f97316','#eab308','#8b5cf6','#ec4899','#06b6d4','#10b981'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#475569', font: { weight: '900', size: 10 } } } } } });
            new Chart(document.getElementById('bankPieChart'), { type: 'doughnut', data: { labels: Object.keys(bankData), datasets: [{ data: Object.values(bankData), backgroundColor: ['#2563eb','#10b981','#8b5cf6','#ea580c','#ef4444','#ec4899'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#475569', font: { weight: '900', size: 10 } } } } } });
        };

        // --- SUBMISSION MOTORU ---
        window.saveTransaction = async (e) => {
            e.preventDefault(); const btn = document.getElementById('save-btn'); btn.disabled = true; btn.innerText = "MÜHÜRLENİYOR...";
            const editId = document.getElementById('editing-id').value;
            const stdVal = document.getElementById('t-student').value; const isGm = stdVal === 'babaanne';
            const data = { teacher_id: userProfile.id, student_id: (isGm || !stdVal) ? null : stdVal, amount: Number(document.getElementById('t-amount').value), description: document.getElementById('t-desc').value, type: document.getElementById('t-type').value, category: document.getElementById('t-category').value, bank_name: document.getElementById('t-bank').value, is_grandmother: isGm, transaction_date: new Date().toISOString() };
            const res = editId ? await supabaseClient.from('transactions').update(data).eq('id', editId) : await supabaseClient.from('transactions').insert([data]);
            if(!res.error) { await fetchData(); closeModal('transaction-modal'); navigate('dashboard'); } else alert(res.error.message); btn.disabled = false;
        };

        window.setType = (type) => {
            document.getElementById('t-type').value = type; const isInc = type === 'income';
            document.getElementById('btn-inc').className = isInc ? 'py-5 rounded-2xl border-2 font-black text-sm uppercase transition bg-blue-600 border-blue-500/30 text-white shadow-lg' : 'py-5 rounded-2xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm';
            document.getElementById('btn-exp').className = !isInc ? 'py-5 rounded-2xl border-2 font-black text-sm uppercase transition bg-red-600 border-red-500/30 text-white shadow-lg' : 'py-5 rounded-2xl border-2 font-black text-sm uppercase transition border-white/10 opacity-50 text-slate-500 shadow-sm';
            document.getElementById('t-category').innerHTML = (isInc ? incCats : expCats).map(c => `<option value="${c}">${c}</option>`).join('');
        };

        window.deleteItem = async (tbl, id, cb) => { if(confirm("Ali Hoca, bu rasyonel kaydı silmek istediğine emin misin?")) { await supabaseClient.from(tbl).delete().eq('id', id); await cb(); navigate(localStorage.getItem('student_last_tab')); } };

        window.onload = initAuth;
        document.getElementById('login-form').onsubmit = handleLogin;
    </script>
</body>
</html>
